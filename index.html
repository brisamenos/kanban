<!DOCTYPE html>
<html lang="pt-br" x-data="crmPro()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EvoCRM Pro | Igor Borges</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        [x-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .bg-chat { background-color: #0b141a; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; opacity: 0.4; }
        .kanban-col { min-width: 320px; height: calc(100vh - 240px); }
        .active-tab { border-bottom: 2px solid #6366f1; color: #6366f1; }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 antialiased overflow-hidden">

    <nav class="flex items-center justify-between px-6 py-4 border-b border-slate-800 bg-[#020617]/80 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <div class="p-2 bg-indigo-600 rounded-lg">
                <i data-lucide="command" class="text-white w-6 h-6"></i>
            </div>
            <div>
                <h1 class="font-black tracking-tight text-lg">EVO<span class="text-indigo-500">CRM</span></h1>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Power by Igor Borges</p>
            </div>
        </div>
        
        <div class="flex gap-2 bg-slate-900/50 p-1 rounded-xl border border-slate-800">
            <button @click="screen = 'dash'" :class="screen === 'dash' && 'bg-slate-800 text-white'" class="px-4 py-2 rounded-lg text-xs font-bold transition-all">Dash</button>
            <button @click="screen = 'kanban'" :class="screen === 'kanban' && 'bg-slate-800 text-white'" class="px-4 py-2 rounded-lg text-xs font-bold transition-all">Pipeline</button>
            <button @click="screen = 'campanhas'" :class="screen === 'campanhas' && 'bg-slate-800 text-white'" class="px-4 py-2 rounded-lg text-xs font-bold transition-all">Campanhas</button>
        </div>

        <div class="flex items-center gap-3">
            <div class="hidden md:block text-right">
                <p class="text-xs font-bold">Igor Borges</p>
                <p class="text-[9px] text-emerald-500 uppercase font-black">Admin Online</p>
            </div>
            <div class="w-10 h-10 rounded-full border-2 border-indigo-500/30 p-0.5">
                <img src="https://ui-avatars.com/api/?name=Igor+Borges&background=6366f1&color=fff" class="rounded-full">
            </div>
        </div>
    </nav>

    <main class="h-screen overflow-y-auto pb-40 p-6">
        
        <div x-show="screen === 'dash'" x-cloak class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="bg-slate-900/50 border border-slate-800 p-5 rounded-2xl">
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-2 bg-indigo-500/10 rounded-lg"><i data-lucide="users" class="text-indigo-500 w-5 h-5"></i></div>
                        <span class="text-[10px] font-bold text-emerald-500">+12%</span>
                    </div>
                    <p class="text-slate-500 text-[10px] font-bold uppercase tracking-wider">Total Leads</p>
                    <h3 class="text-3xl font-black mt-1" x-text="leads.length">0</h3>
                </div>
                <div class="bg-slate-900/50 border border-slate-800 p-5 rounded-2xl">
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-2 bg-emerald-500/10 rounded-lg"><i data-lucide="shopping-cart" class="text-emerald-500 w-5 h-5"></i></div>
                    </div>
                    <p class="text-slate-500 text-[10px] font-bold uppercase tracking-wider">Vendas</p>
                    <h3 class="text-3xl font-black mt-1" x-text="leads.filter(l => l.status === 'fechado').length">0</h3>
                </div>
                <div class="bg-slate-900/50 border border-slate-800 p-5 rounded-2xl">
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-2 bg-amber-500/10 rounded-lg"><i data-lucide="message-square" class="text-amber-500 w-5 h-5"></i></div>
                    </div>
                    <p class="text-slate-500 text-[10px] font-bold uppercase tracking-wider">Aguardando</p>
                    <h3 class="text-3xl font-black mt-1" x-text="leads.filter(l => l.status === 'novo_lead').length">0</h3>
                </div>
                <div class="bg-slate-900/50 border border-slate-800 p-5 rounded-2xl">
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-2 bg-indigo-500/10 rounded-lg"><i data-lucide="user-check" class="text-indigo-500 w-5 h-5"></i></div>
                    </div>
                    <p class="text-slate-500 text-[10px] font-bold uppercase tracking-wider">Atendentes</p>
                    <h3 class="text-3xl font-black mt-1">01</h3>
                </div>
            </div>
        </div>

        <div x-show="screen === 'kanban'" x-cloak class="flex gap-6 overflow-x-auto pb-10 no-scrollbar">
            <template x-for="col in columns" :key="col.id">
                <div class="kanban-col flex flex-col gap-4" @dragover.prevent @drop="updateStatus($event.dataTransfer.getData('leadId'), col.id)">
                    <div class="flex items-center justify-between px-2">
                        <div class="flex items-center gap-2">
                            <div class="w-2 h-2 rounded-full" :class="col.color"></div>
                            <span class="text-xs font-black uppercase tracking-widest text-slate-400" x-text="col.name"></span>
                        </div>
                        <span class="text-[10px] bg-slate-800 px-2 py-0.5 rounded text-slate-500" x-text="leads.filter(l => l.status === col.id).length"></span>
                    </div>
                    
                    <div class="flex-1 overflow-y-auto flex flex-col gap-3 no-scrollbar">
                        <template x-for="lead in leads.filter(l => l.status === col.id)" :key="lead.id">
                            <div draggable="true" @dragstart="$event.dataTransfer.setData('leadId', lead.id)" @click="openChat(lead)" 
                                 class="bg-slate-900 border border-slate-800 p-4 rounded-xl hover:border-indigo-500/50 transition-all cursor-pointer shadow-sm group">
                                <div class="flex justify-between items-start mb-3">
                                    <h4 class="font-bold text-sm" x-text="lead.nome"></h4>
                                    <i data-lucide="more-horizontal" class="w-4 h-4 text-slate-700"></i>
                                </div>
                                <div class="flex flex-wrap gap-1 mb-3">
                                    <template x-for="tag in lead.tags || []">
                                        <span class="text-[8px] px-2 py-0.5 rounded bg-indigo-500/10 text-indigo-400 font-bold uppercase" x-text="tag"></span>
                                    </template>
                                </div>
                                <div class="flex justify-between items-center text-[10px] text-slate-500">
                                    <span class="flex items-center gap-1"><i data-lucide="phone" class="w-3 h-3"></i> <span x-text="lead.numero"></span></span>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </template>
        </div>

        <div x-show="screen === 'campanhas'" x-cloak class="max-w-2xl mx-auto bg-slate-900 border border-slate-800 p-8 rounded-3xl">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2"><i data-lucide="send" class="text-indigo-500"></i> Disparo em Massa</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase">Filtrar por Status</label>
                    <select x-model="campanha.status" class="w-full bg-slate-800 border-slate-700 rounded-xl mt-2 p-3 text-sm">
                        <option value="todos">Todos os Leads</option>
                        <option value="novo_lead">Novos Leads</option>
                        <option value="fechado">Vendas</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase">Mensagem da Campanha</label>
                    <textarea x-model="campanha.msg" rows="5" class="w-full bg-slate-800 border-slate-700 rounded-xl mt-2 p-3 text-sm" placeholder="Olá {{nome}}, tudo bem?"></textarea>
                </div>
                <button @click="executarCampanha()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-indigo-500/20">
                    Iniciar Disparo (Aguarde o delay para evitar banimento)
                </button>
            </div>
        </div>
    </main>

    <div x-show="isChatOpen" x-transition x-cloak class="fixed inset-0 bg-[#020617] z-[100] flex flex-col md:inset-10 md:rounded-3xl border border-slate-800 shadow-2xl overflow-hidden">
        <header class="p-4 bg-slate-900/50 border-b border-slate-800 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button @click="isChatOpen = false" class="p-2 hover:bg-slate-800 rounded-lg"><i data-lucide="x" class="w-5 h-5"></i></button>
                <div>
                    <h3 class="font-bold text-sm" x-text="selectedLead?.nome"></h3>
                    <p class="text-[10px] text-emerald-500 font-bold uppercase">Atendimento Ativo</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button class="px-3 py-1 bg-slate-800 rounded text-[10px] font-bold uppercase hover:bg-slate-700">Mudar Status</button>
                <button class="px-3 py-1 bg-indigo-600 rounded text-[10px] font-bold uppercase hover:bg-indigo-500">Gerar Orçamento</button>
            </div>
        </header>

        <div class="flex-1 bg-chat overflow-y-auto p-6 space-y-4" id="chat-box">
            <template x-for="msg in messages" :key="msg.id">
                <div :class="msg.from_me ? 'justify-end' : 'justify-start'" class="flex w-full">
                    <div :class="msg.from_me ? 'bg-indigo-600' : 'bg-slate-800'" class="p-3 px-4 rounded-2xl max-w-[70%] shadow-lg">
                        <p class="text-sm" x-text="msg.content"></p>
                        <p class="text-[8px] mt-1 opacity-50 text-right uppercase" x-text="new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})"></p>
                    </div>
                </div>
            </template>
        </div>

        <footer class="p-4 bg-slate-900/50 border-t border-slate-800 flex gap-3">
            <input x-model="msgInput" @keydown.enter="sendMsg()" type="text" placeholder="Digite sua resposta..." class="flex-1 bg-slate-800 border-none rounded-xl px-4 py-3 text-sm focus:ring-1 focus:ring-indigo-500">
            <button @click="sendMsg()" class="bg-indigo-600 p-3 px-5 rounded-xl hover:bg-indigo-500 transition-colors">
                <i data-lucide="send" class="w-5 h-5"></i>
            </button>
        </footer>
    </div>

    <script>
        function crmPro() {
            return {
                screen: 'dash',
                isChatOpen: false,
                selectedLead: null,
                msgInput: '',
                leads: [],
                messages: [],
                campanha: { status: 'todos', msg: '' },
                columns: [
                    { id: 'novo_lead', name: 'Triagem', color: 'bg-indigo-500' },
                    { id: 'atendimento', name: 'Em Conversa', color: 'bg-amber-500' },
                    { id: 'proposta', name: 'Aguardando Pix', color: 'bg-emerald-500' },
                    { id: 'fechado', name: 'Venda Concluída', color: 'bg-slate-500' }
                ],
                
                async init() {
                    const SB_URL = 'https://qhnbisjogpdoyszpsucs.supabase.co';
                    const SB_KEY = 'sb_publishable_3PAly_BCdvoldAzm1Y7SxQ_S3rp2QhQ';
                    this.client = supabase.createClient(SB_URL, SB_KEY);
                    
                    await this.loadLeads();
                    this.setupRealtime();
                    lucide.createIcons();
                },

                async loadLeads() {
                    const { data } = await this.client.from('leads').select('*').order('created_at', { ascending: false });
                    if (data) this.leads = data;
                },

                setupRealtime() {
                    this.client.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'leads' }, () => this.loadLeads()).subscribe();
                    this.client.channel('msgs').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                        if (this.isChatOpen && payload.new.lead_id === this.selectedLead.id) {
                            this.messages.push(payload.new);
                            this.scrollToBottom();
                        }
                    }).subscribe();
                },

                async updateStatus(leadId, newStatus) {
                    await this.client.from('leads').update({ status: newStatus }).eq('id', leadId);
                },

                async openChat(lead) {
                    this.selectedLead = lead;
                    this.isChatOpen = true;
                    const { data } = await this.client.from('messages').select('*').eq('lead_id', lead.id).order('timestamp', { ascending: true });
                    this.messages = data || [];
                    this.scrollToBottom();
                },

                async sendMsg(customNumber = null, customMsg = null) {
                    const number = customNumber || this.selectedLead.numero;
                    const text = customMsg || this.msgInput;
                    if(!text) return;

                    await fetch('https://projeto-evolution-api.xtknqq.easypanel.host/message/sendText/igor', {
                        method: 'POST',
                        headers: { 'apikey': '773C15E29974-4BA2-B003-3F697EC279AE', 'Content-Type': 'application/json' },
                        body: JSON.stringify({ "number": number, "text": text })
                    });
                    if(!customNumber) this.msgInput = '';
                },

                async executarCampanha() {
                    if(!confirm("Deseja iniciar o disparo em massa?")) return;
                    const targets = this.campanha.status === 'todos' ? this.leads : this.leads.filter(l => l.status === this.campanha.status);
                    
                    for (const lead of targets) {
                        const personalizada = this.campanha.msg.replace('{{nome}}', lead.nome);
                        await this.sendMsg(lead.numero, personalizada);
                        await new Promise(r => setTimeout(r, 2000)); // Delay seguro
                    }
                    alert("Campanha finalizada com sucesso!");
                },

                scrollToBottom() {
                    setTimeout(() => { const b = document.getElementById('chat-box'); if(b) b.scrollTop = b.scrollHeight; }, 100);
                }
            }
        }
    </script>
</body>
</html>
