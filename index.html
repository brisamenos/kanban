<!DOCTYPE html>
<html lang="pt-br" x-data="crmUltra()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EvoCRM Ultra Pro | Igor Borges</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        [x-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .bg-chat { background-color: #0b141a; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; opacity: 0.15; }
        .kanban-col { min-width: 320px; height: calc(100vh - 200px); }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(16px); }
        .card-shadow { box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 antialiased overflow-hidden font-sans">

    <div class="flex h-screen">
        <aside class="w-20 bg-slate-900 border-r border-slate-800 flex flex-col items-center py-6 gap-8 z-50">
            <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <i data-lucide="zap" class="text-white w-6 h-6"></i>
            </div>
            <nav class="flex flex-col gap-6 flex-1">
                <button @click="screen = 'dash'" :class="screen === 'dash' ? 'text-indigo-400' : 'text-slate-500'" class="p-3 hover:bg-slate-800 rounded-xl transition-all"><i data-lucide="layout-grid"></i></button>
                <button @click="screen = 'kanban'" :class="screen === 'kanban' ? 'text-indigo-400' : 'text-slate-500'" class="p-3 hover:bg-slate-800 rounded-xl transition-all"><i data-lucide="trello"></i></button>
                <button @click="screen = 'campanhas'" :class="screen === 'campanhas' ? 'text-indigo-400' : 'text-slate-500'" class="p-3 hover:bg-slate-800 rounded-xl transition-all"><i data-lucide="megaphone"></i></button>
                <button @click="screen = 'funis'" :class="screen === 'funis' ? 'text-indigo-400' : 'text-slate-500'" class="p-3 hover:bg-slate-800 rounded-xl transition-all"><i data-lucide="git-branch"></i></button>
                <button @click="screen = 'settings'" :class="screen === 'settings' ? 'text-indigo-400' : 'text-slate-500'" class="p-3 hover:bg-slate-800 rounded-xl transition-all"><i data-lucide="settings"></i></button>
            </nav>
            <div class="w-10 h-10 rounded-full border border-slate-700 overflow-hidden">
                <img src="https://ui-avatars.com/api/?name=Igor+Borges&background=6366f1&color=fff" alt="Profile">
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative overflow-hidden">
            
            <header class="h-20 border-b border-slate-800 bg-[#020617]/50 backdrop-blur-md px-8 flex items-center justify-between">
                <div>
                    <h2 class="text-xs font-black uppercase tracking-[0.2em] text-indigo-500" x-text="screen"></h2>
                    <p class="text-xl font-bold">EvoCRM Pro <span class="text-slate-500 font-normal">| Igor Borges</span></p>
                </div>
                <div class="flex items-center gap-4">
                    <div class="bg-slate-900 px-4 py-2 rounded-xl border border-slate-800 flex items-center gap-2">
                        <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                        <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400">Instância: igor</span>
                    </div>
                </div>
            </header>

            <section class="flex-1 overflow-y-auto p-8 no-scrollbar">
                
                <div x-show="screen === 'dash'" x-cloak class="grid grid-cols-1 md:grid-cols-4 gap-6">
                    <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl card-shadow">
                        <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Leads Ativos</p>
                        <h3 class="text-4xl font-black mt-2" x-text="leads.length">0</h3>
                    </div>
                    <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl card-shadow border-l-4 border-l-emerald-500">
                        <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Vendas Concluídas</p>
                        <h3 class="text-4xl font-black mt-2" x-text="leads.filter(l => l.status === 'fechado').length">0</h3>
                    </div>
                    <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl card-shadow border-l-4 border-l-indigo-500">
                        <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Atendentes Online</p>
                        <h3 class="text-4xl font-black mt-2">01</h3>
                    </div>
                    <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl card-shadow border-l-4 border-l-amber-500">
                        <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Novas Mensagens</p>
                        <h3 class="text-4xl font-black mt-2" x-text="leads.filter(l => l.status === 'novo_lead').length">0</h3>
                    </div>
                </div>

                <div x-show="screen === 'kanban'" x-cloak class="flex gap-6 overflow-x-auto pb-10 no-scrollbar">
                    <template x-for="col in columns" :key="col.id">
                        <div class="kanban-col flex flex-col gap-4" @dragover.prevent @drop="updateStatus($event.dataTransfer.getData('leadId'), col.id)">
                            <div class="flex items-center justify-between px-2">
                                <div class="flex items-center gap-2">
                                    <div class="w-1.5 h-6 rounded-full" :class="col.color"></div>
                                    <span class="text-xs font-black uppercase tracking-widest text-slate-400" x-text="col.name"></span>
                                </div>
                                <span class="text-[10px] bg-slate-800 px-2 py-0.5 rounded text-slate-500" x-text="leads.filter(l => l.status === col.id).length"></span>
                            </div>
                            <div class="flex-1 overflow-y-auto flex flex-col gap-3 no-scrollbar">
                                <template x-for="lead in leads.filter(l => l.status === col.id)" :key="lead.id">
                                    <div draggable="true" @dragstart="$event.dataTransfer.setData('leadId', lead.id)" @click="openChat(lead)" 
                                         class="bg-slate-900 border border-slate-800 p-5 rounded-2xl hover:border-indigo-500/50 transition-all cursor-pointer card-shadow group">
                                        <div class="flex justify-between items-start mb-4">
                                            <h4 class="font-bold text-sm group-hover:text-indigo-400 transition-colors" x-text="lead.nome"></h4>
                                            <div class="flex gap-1">
                                                <template x-for="tag in lead.tags || []">
                                                    <span class="w-2 h-2 rounded-full bg-indigo-500"></span>
                                                </template>
                                            </div>
                                        </div>
                                        <p class="text-[11px] text-slate-500 mb-4 flex items-center gap-2">
                                            <i data-lucide="phone" class="w-3 h-3"></i> <span x-text="lead.numero"></span>
                                        </p>
                                        <div class="flex justify-between items-center">
                                            <div class="flex -space-x-2">
                                                <div class="w-6 h-6 rounded-full bg-indigo-600 border-2 border-slate-900 flex items-center justify-center text-[8px] font-bold">IB</div>
                                            </div>
                                            <i data-lucide="message-square" class="w-4 h-4 text-slate-700"></i>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>

                <div x-show="screen === 'campanhas'" x-cloak class="max-w-3xl mx-auto space-y-8">
                    <div class="bg-slate-900 border border-slate-800 p-8 rounded-[2rem] card-shadow">
                        <h2 class="text-xl font-bold mb-6">Disparo em Massa Inteligente</h2>
                        <div class="grid grid-cols-2 gap-6 mb-6">
                            <div>
                                <label class="text-[10px] font-black uppercase text-slate-500 mb-2 block">Público Alvo</label>
                                <select x-model="campanha.status" class="w-full bg-slate-800 border-none rounded-xl p-4 text-sm focus:ring-2 focus:ring-indigo-500 transition-all">
                                    <option value="todos">Todos os Contatos</option>
                                    <option value="novo_lead">Apenas Novos Leads</option>
                                    <option value="fechado">Apenas Clientes</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] font-black uppercase text-slate-500 mb-2 block">Agendamento</label>
                                <input type="datetime-local" class="w-full bg-slate-800 border-none rounded-xl p-4 text-sm text-slate-400">
                            </div>
                        </div>
                        <div>
                            <label class="text-[10px] font-black uppercase text-slate-500 mb-2 block">Mensagem (Use {nome} para personalizar)</label>
                            <textarea x-model="campanha.msg" rows="6" class="w-full bg-slate-800 border-none rounded-2xl p-4 text-sm mb-6" placeholder="Olá {nome}, tudo bem? Temos uma novidade..."></textarea>
                        </div>
                        <button @click="executarCampanha()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-5 rounded-2xl transition-all shadow-lg shadow-indigo-500/20 active:scale-[0.98]">
                            Iniciar Campanha com Delay de Segurança
                        </button>
                    </div>
                </div>

            </section>

            <div x-show="isChatOpen" class="fixed bottom-24 right-8 z-[110] flex flex-col gap-2">
                <template x-for="q in quickMsgs">
                    <button @click="msgInput = q.text" class="bg-slate-800 border border-slate-700 px-4 py-2 rounded-full text-[10px] font-bold uppercase hover:bg-indigo-600 transition-all shadow-xl" x-text="q.label"></button>
                </template>
            </div>

            <div x-show="isChatOpen" x-transition x-cloak class="fixed inset-y-0 right-0 w-full md:w-[500px] glass border-l border-slate-800 z-[100] flex flex-col shadow-2xl">
                <header class="p-6 border-b border-slate-800 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <button @click="isChatOpen = false" class="p-2 hover:bg-slate-800 rounded-lg transition-all"><i data-lucide="chevron-right"></i></button>
                        <div>
                            <h3 class="font-bold text-lg" x-text="selectedLead?.nome"></h3>
                            <p class="text-[10px] text-emerald-500 font-black uppercase tracking-widest flex items-center gap-1">
                                <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full"></span> Conectado
                            </p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button class="p-2 text-slate-500 hover:text-white"><i data-lucide="paperclip" class="w-5 h-5"></i></button>
                        <button class="p-2 text-slate-500 hover:text-white"><i data-lucide="mic" class="w-5 h-5"></i></button>
                    </div>
                </header>

                <div class="flex-1 bg-chat overflow-y-auto p-6 space-y-4 no-scrollbar" id="chat-box">
                    <template x-for="msg in messages" :key="msg.id">
                        <div :class="msg.from_me ? 'justify-end' : 'justify-start'" class="flex w-full animate-in fade-in duration-300">
                            <div :class="msg.from_me ? 'bg-indigo-600 rounded-2xl rounded-tr-none' : 'bg-slate-800 rounded-2xl rounded-tl-none'" 
                                 class="p-4 max-w-[85%] shadow-xl border border-white/5">
                                <template x-if="msg.type === 'audio'">
                                    <div class="flex items-center gap-3 py-1">
                                        <i data-lucide="play" class="w-4 h-4 fill-current"></i>
                                        <div class="h-1 w-32 bg-white/20 rounded-full"></div>
                                    </div>
                                </template>
                                <template x-if="msg.type !== 'audio'">
                                    <p class="text-sm leading-relaxed" x-text="msg.content"></p>
                                </template>
                                <div class="flex items-center justify-end gap-1 mt-2 opacity-40">
                                    <span class="text-[8px] font-bold uppercase" x-text="new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})"></span>
                                    <template x-if="msg.from_me"><i data-lucide="check-check" class="w-3 h-3"></i></template>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>

                <footer class="p-6 bg-slate-900/80 border-t border-slate-800 flex gap-4">
                    <input x-model="msgInput" @keydown.enter="sendMsg()" type="text" placeholder="Envie sua proposta..." class="flex-1 bg-slate-800 border-none rounded-2xl px-6 py-4 text-sm focus:ring-2 focus:ring-indigo-500 transition-all outline-none">
                    <button @click="sendMsg()" class="bg-indigo-600 p-4 rounded-2xl hover:bg-indigo-500 transition-all shadow-lg shadow-indigo-500/30 active:scale-95">
                        <i data-lucide="send" class="w-6 h-6 text-white"></i>
                    </button>
                </footer>
            </div>
        </main>
    </div>

    <script>
        function crmUltra() {
            return {
                screen: 'dash',
                isChatOpen: false,
                selectedLead: null,
                msgInput: '',
                leads: [],
                messages: [],
                campanha: { status: 'todos', msg: '' },
                quickMsgs: [
                    { label: '👋 Saudação', text: 'Olá {nome}, tudo bem? Sou o Igor.' },
                    { label: '💰 Proposta', text: 'Aqui está sua proposta de energia solar.' },
                    { label: '📍 Local', text: 'Nossa sede fica em Russas, Ceará.' }
                ],
                columns: [
                    { id: 'novo_lead', name: 'Triagem / IA', color: 'bg-amber-500' },
                    { id: 'atendimento', name: 'Em Negociação', color: 'bg-indigo-500' },
                    { id: 'proposta', name: 'Aguardando Pagamento', color: 'bg-emerald-500' },
                    { id: 'fechado', name: 'Contrato Fechado', color: 'bg-slate-600' }
                ],
                
                async init() {
                    const SB_URL = 'https://qhnbisjogpdoyszpsucs.supabase.co';
                    const SB_KEY = 'sb_publishable_3PAly_BCdvoldAzm1Y7SxQ_S3rp2QhQ';
                    this.client = supabase.createClient(SB_URL, SB_KEY);
                    
                    await this.loadLeads();
                    this.setupRealtime();
                    lucide.createIcons();
                },

                async loadLeads() {
                    const { data } = await this.client.from('leads').select('*').order('created_at', { ascending: false });
                    if (data) {
                        this.leads = data;
                        setTimeout(() => lucide.createIcons(), 100);
                    }
                },

                setupRealtime() {
                    // Atualiza Leads
                    this.client.channel('leads-all').on('postgres_changes', { event: '*', schema: 'public', table: 'leads' }, () => this.loadLeads()).subscribe();
                    
                    // Atualiza Mensagens
                    this.client.channel('msgs-all').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                        if (this.isChatOpen && payload.new.lead_id === this.selectedLead.id) {
                            this.messages.push(payload.new);
                            this.scrollToBottom();
                            setTimeout(() => lucide.createIcons(), 50);
                        }
                    }).subscribe();
                },

                async updateStatus(leadId, newStatus) {
                    if(!leadId) return;
                    await this.client.from('leads').update({ status: newStatus }).eq('id', leadId);
                },

                async openChat(lead) {
                    this.selectedLead = lead;
                    this.isChatOpen = true;
                    this.messages = [];
                    const { data } = await this.client.from('messages').select('*').eq('lead_id', lead.id).order('timestamp', { ascending: true });
                    this.messages = data || [];
                    this.scrollToBottom();
                    setTimeout(() => lucide.createIcons(), 100);
                },

                async sendMsg(customNum = null, customTxt = null) {
                    const num = customNum || this.selectedLead.numero;
                    const text = customTxt || this.msgInput;
                    if(!text) return;

                    const EVO_URL = 'https://projeto-evolution-api.xtknqq.easypanel.host';
                    const API_KEY = '773C15E29974-4BA2-B003-3F697EC279AE';
                    const INSTANCE = 'igor';

                    try {
                        await fetch(`${EVO_URL}/message/sendText/${INSTANCE}`, {
                            method: 'POST',
                            headers: { 'apikey': API_KEY, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ "number": num, "text": text })
                        });
                        if(!customNum) this.msgInput = '';
                    } catch (e) { console.error(e); }
                },

                async executarCampanha() {
                    const targets = this.campanha.status === 'todos' ? this.leads : this.leads.filter(l => l.status === this.campanha.status);
                    if(!confirm(`Deseja disparar para ${targets.length} leads?`)) return;
                    
                    for (const lead of targets) {
                        const msg = this.campanha.msg.replace('{nome}', lead.nome);
                        await this.sendMsg(lead.numero, msg);
                        await new Promise(r => setTimeout(r, 3000));
                    }
                    alert("Campanha finalizada!");
                },

                scrollToBottom() {
                    setTimeout(() => { const b = document.getElementById('chat-box'); if(b) b.scrollTop = b.scrollHeight; }, 100);
                }
            }
        }
    </script>
</body>
</html>
