<!DOCTYPE html>
<html lang="pt-br" x-data="crmApp()" :class="{ 'dark': isDarkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EvoCRM Pro | Igor Borges</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: {
                    colors: {
                        panel: { light: '#FFFFFF', dark: '#0f172a' },
                        bg: { light: '#f8fafc', dark: '#020617' },
                    }
                } 
            }
        }
    </script>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://bernardo-castilho.github.io/DragDropTouch/DragDropTouch.js"></script>

    <style>
        [x-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .kanban-col { min-width: 88vw; max-width: 88vw; height: calc(100vh - 180px); scroll-snap-align: center; }
        @media (min-width: 768px) { .kanban-col { min-width: 320px; max-width: 320px; height: calc(100vh - 200px); } }
        .kanban-container { scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
        .glass { background: rgba(255, 255, 255, 0.9) !important; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .dark .glass { background: rgba(15, 23, 42, 0.9) !important; }
        .bg-chat-pattern { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .pt-safe { padding-top: env(safe-area-inset-top); }
        body { touch-action: pan-y; overscroll-behavior-y: contain; }
    </style>
</head>
<body class="bg-bg-light text-slate-800 dark:bg-bg-dark dark:text-slate-200 antialiased font-sans overflow-hidden transition-colors duration-300">

    <div class="flex h-screen w-full relative pt-safe">
        
        <aside class="w-64 glass border-r hidden md:flex flex-col z-20">
            <div class="p-6 flex items-center gap-3 border-b border-gray-100 dark:border-slate-800/50">
                <div class="w-9 h-9 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-500/40">
                    <i data-lucide="zap" class="text-white w-5 h-5"></i>
                </div>
                <h1 class="font-black text-xl tracking-tighter dark:text-white">EVO<span class="text-indigo-500">PRO</span></h1>
            </div>
            <nav class="flex-1 px-4 space-y-1.5 mt-4">
                <template x-for="item in navItems">
                    <button @click="screen = item.id" :class="screen === item.id ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-500 dark:text-slate-400 hover:bg-gray-100 dark:hover:bg-slate-800'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold transition-all">
                        <i :data-lucide="item.icon" class="w-4 h-4"></i> <span x-text="item.label"></span>
                    </button>
                </template>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col relative w-full h-full overflow-hidden">
            <header class="h-14 md:h-20 px-4 md:px-10 flex items-center justify-between glass border-b shrink-0 z-10">
                <div class="flex items-center gap-2">
                    <div class="md:hidden w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center shadow-md"><i data-lucide="zap" class="text-white w-4 h-4"></i></div>
                    <h2 class="font-black text-base md:text-xl tracking-tight dark:text-white" x-text="navItems.find(i => i.id === screen)?.label || 'CRM'"></h2>
                </div>
                <div class="flex items-center gap-3">
                    <button @click="toggleTheme()" class="p-2 text-slate-500 dark:text-slate-300"><i :data-lucide="isDarkMode ? 'sun' : 'moon'" class="w-5 h-5"></i></button>
                    <div class="w-8 h-8 rounded-full bg-indigo-100 dark:bg-slate-800 flex items-center justify-center border-2 border-indigo-500/20">
                        <span class="text-[10px] font-black text-indigo-600 dark:text-indigo-400">IB</span>
                    </div>
                </div>
            </header>

            <section class="flex-1 overflow-y-auto p-3 md:p-8 no-scrollbar">
                
                <div x-show="screen === 'dash'" x-cloak class="grid grid-cols-2 gap-3 md:grid-cols-4 md:gap-6">
                    <div class="bg-white dark:bg-slate-900 p-5 rounded-3xl border border-gray-100 dark:border-slate-800 shadow-sm text-center">
                        <p class="text-slate-500 text-[10px] font-black uppercase mb-1">Leads</p>
                        <h3 class="text-3xl font-black dark:text-white" x-text="leads.length">0</h3>
                    </div>
                    <div class="bg-white dark:bg-slate-900 p-5 rounded-3xl border border-gray-100 dark:border-slate-800 border-b-4 border-b-emerald-500 shadow-sm text-center">
                        <p class="text-slate-500 text-[10px] font-black uppercase mb-1">Vendas</p>
                        <h3 class="text-3xl font-black dark:text-white" x-text="leads.filter(l => l.status === 'fechado').length">0</h3>
                    </div>
                </div>

                <div x-show="screen === 'kanban'" x-cloak class="flex gap-4 overflow-x-auto pb-4 no-scrollbar kanban-container h-full">
                    <template x-for="col in columns" :key="col.id">
                        <div class="kanban-col flex flex-col gap-3 bg-slate-200/40 dark:bg-slate-900/40 p-3 rounded-[2.5rem]" @dragover.prevent @drop="updateStatus($event.dataTransfer.getData('id'), col.id)">
                            <div class="flex items-center justify-between px-2">
                                <span class="text-[10px] font-black uppercase text-slate-500 tracking-wider" x-text="col.name"></span>
                                <span class="text-[10px] bg-white dark:bg-slate-800 px-2 py-1 rounded-full font-bold dark:text-white shadow-sm border dark:border-slate-700" x-text="leads.filter(l => l.status === col.id).length"></span>
                            </div>
                            <div class="flex-1 overflow-y-auto flex flex-col gap-3 no-scrollbar pb-10">
                                <template x-for="lead in leads.filter(l => l.status === col.id)" :key="lead.id">
                                    <div draggable="true" @dragstart="$event.dataTransfer.setData('id', lead.id)" @click="openChat(lead)" class="bg-white dark:bg-slate-800 p-3 rounded-2xl shadow-sm border border-gray-100 dark:border-slate-700/50 active:scale-[0.98] transition-all cursor-grab active:cursor-grabbing">
                                        <div class="flex items-center gap-3">
                                            <div class="relative flex-shrink-0">
                                                <img :src="lead.foto_url || 'https://api.dicebear.com/8.x/notionists/svg?seed=' + lead.nome" class="w-10 h-10 rounded-xl object-cover bg-slate-100" @error="$el.src = 'https://api.dicebear.com/8.x/notionists/svg?seed=' + lead.nome">
                                                <div class="absolute -bottom-1 -right-1 w-3 h-3 bg-emerald-500 border-2 border-white dark:border-slate-800 rounded-full shadow-sm"></div>
                                            </div>
                                            <div class="flex-1 overflow-hidden">
                                                <h4 class="font-bold text-sm text-slate-900 dark:text-white truncate" x-text="lead.nome"></h4>
                                                <p class="text-[10px] text-slate-500 font-medium truncate" x-text="lead.numero"></p>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>

                <div x-show="screen === 'bot'" x-cloak class="max-w-xl mx-auto space-y-4 pb-20">
                    <div class="bg-white dark:bg-slate-900 p-6 rounded-[2rem] border dark:border-slate-800 shadow-sm">
                        <h3 class="font-black text-lg mb-4 dark:text-white">Configurar Robô</h3>
                        <div class="space-y-3">
                            <input x-model="newRule.trigger" type="text" placeholder="Se o cliente disser..." class="w-full bg-slate-50 dark:bg-slate-950 border dark:border-slate-800 rounded-xl p-4 text-sm dark:text-white outline-none ring-offset-2 focus:ring-2 ring-indigo-500 transition-all">
                            <textarea x-model="newRule.response" placeholder="O robô responde..." rows="3" class="w-full bg-slate-50 dark:bg-slate-950 border dark:border-slate-800 rounded-xl p-4 text-sm dark:text-white outline-none ring-offset-2 focus:ring-2 ring-indigo-500 transition-all"></textarea>
                            <button @click="saveBotRule()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-xl shadow-lg shadow-indigo-500/20 active:scale-95 transition-all">Salvar Automação</button>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <template x-for="rule in botRules" :key="rule.id">
                            <div class="bg-white dark:bg-slate-900 p-5 rounded-2xl flex justify-between items-center border dark:border-slate-800 shadow-sm">
                                <div>
                                    <p class="text-[10px] font-black text-indigo-500 uppercase mb-1" x-text="`Gatilho: ${rule.trigger_text}`"></p>
                                    <p class="text-sm dark:text-white font-medium" x-text="rule.response_text"></p>
                                </div>
                                <button @click="deleteBotRule(rule.id)" class="p-2 text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-all"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </template>
                    </div>
                </div>

                <div x-show="screen === 'disparo'" x-cloak class="max-w-xl mx-auto space-y-4 pb-20">
                    <div class="bg-white dark:bg-slate-900 p-6 rounded-[2rem] border dark:border-slate-800 shadow-sm">
                        <h3 class="font-black text-lg mb-4 dark:text-white flex items-center gap-2">
                            <i data-lucide="sparkles" class="text-indigo-500 w-5 h-5"></i> Disparo com IA Gemini
                        </h3>
                        
                        <div class="space-y-4">
                            <div class="bg-indigo-50 dark:bg-indigo-950/40 p-4 rounded-2xl border border-indigo-100 dark:border-indigo-800/50">
                                <label class="text-[10px] font-black uppercase text-indigo-600 dark:text-indigo-400 block mb-2">Qual produto quer vender hoje?</label>
                                <div class="flex gap-2">
                                    <input x-model="aiPrompt" type="text" placeholder="Ex: Produto de emagrecimento com 20% OFF..." class="flex-1 bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-xl p-3 text-sm dark:text-white outline-none">
                                    <button @click="generateGeminiCopy()" :disabled="aiLoading" class="bg-indigo-600 text-white p-3 rounded-xl active:scale-95 transition-all disabled:opacity-50">
                                        <i data-lucide="wand-2" :class="aiLoading && 'animate-spin'" class="w-5 h-5"></i>
                                    </button>
                                </div>
                            </div>

                            <div>
                                <label class="text-[10px] font-black uppercase text-slate-500 mb-1 block">Mensagem (Suporta Spintax {A|B})</label>
                                <textarea x-model="disparoConfig.msg" rows="4" placeholder="Use {nome} para personalizar..." class="w-full bg-slate-50 dark:bg-slate-950 border dark:border-slate-800 rounded-xl p-4 text-sm dark:text-white outline-none ring-offset-2 focus:ring-2 ring-indigo-500 transition-all"></textarea>
                            </div>

                            <div class="flex items-center gap-3 p-3 bg-slate-50 dark:bg-slate-950 rounded-xl border dark:border-slate-800">
                                <input type="file" x-ref="bulkFile" class="hidden" @change="disparoConfig.file = $event.target.files[0]">
                                <button @click="$refs.bulkFile.click()" class="w-10 h-10 bg-white dark:bg-slate-800 rounded-lg flex items-center justify-center border dark:border-slate-700">
                                    <i data-lucide="paperclip" class="w-5 h-5 text-slate-500"></i>
                                </button>
                                <div class="flex-1 truncate">
                                    <span class="text-[10px] font-black text-slate-400 uppercase">Anexo de Mídia</span>
                                    <p class="text-xs font-bold dark:text-white truncate" x-text="disparoConfig.file ? disparoConfig.file.name : 'Nenhum arquivo selecionado'"></p>
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="text-[10px] font-black uppercase text-slate-500 mb-1 block">Status Alvo</label>
                                    <select x-model="disparoConfig.status" class="w-full bg-slate-50 dark:bg-slate-950 border dark:border-slate-800 rounded-xl p-3 text-sm dark:text-white outline-none appearance-none">
                                        <option value="todos">Todos</option>
                                        <template x-for="col in columns" :key="col.id"><option :value="col.id" x-text="col.name"></option></template>
                                    </select>
                                </div>
                                <div class="grid grid-cols-2 gap-2">
                                    <div><label class="text-[10px] font-black uppercase text-slate-500 mb-1 block">Min(s)</label><input x-model="disparoConfig.minDelay" type="number" class="w-full bg-slate-50 dark:bg-slate-950 border dark:border-slate-800 rounded-xl p-3 text-sm dark:text-white outline-none"></div>
                                    <div><label class="text-[10px] font-black uppercase text-slate-500 mb-1 block">Max(s)</label><input x-model="disparoConfig.maxDelay" type="number" class="w-full bg-slate-50 dark:bg-slate-950 border dark:border-slate-800 rounded-xl p-3 text-sm dark:text-white outline-none"></div>
                                </div>
                            </div>

                            <div x-show="disparoConfig.isRunning" class="bg-indigo-50 dark:bg-indigo-900/30 p-4 rounded-2xl border border-indigo-100 dark:border-indigo-800">
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-xs font-black text-indigo-600 dark:text-indigo-300">DISPARANDO...</span>
                                    <span class="text-xs font-black text-indigo-600 dark:text-indigo-300" x-text="`${disparoConfig.sent} / ${disparoConfig.total}`"></span>
                                </div>
                                <div class="w-full bg-indigo-200 dark:bg-indigo-950 rounded-full h-1.5 overflow-hidden">
                                    <div class="bg-indigo-600 h-1.5 rounded-full transition-all duration-500" :style="`width: ${(disparoConfig.sent / disparoConfig.total) * 100}%`"></div>
                                </div>
                            </div>

                            <button @click="iniciarDisparo()" :disabled="disparoConfig.isRunning" class="w-full bg-indigo-600 text-white font-black py-4 rounded-xl shadow-lg shadow-indigo-500/20 active:scale-95 transition-all flex items-center justify-center gap-2">
                                <i data-lucide="play" class="w-4 h-4"></i> Iniciar Campanha
                            </button>
                        </div>
                    </div>
                </div>

            </section>
        </main>

        <div x-show="isChatOpen" class="fixed inset-0 bg-white dark:bg-slate-950 z-[100] flex flex-col md:left-auto md:right-0 md:w-[450px] md:border-l dark:border-slate-800" x-cloak>
            <header class="h-16 px-4 border-b dark:border-slate-800 flex items-center bg-white dark:bg-slate-900 shrink-0 justify-between">
                <div class="flex items-center overflow-hidden">
                    <button @click="isChatOpen = false" class="p-2 -ml-2 mr-1 text-slate-400"><i data-lucide="arrow-left" class="w-6 h-6"></i></button>
                    <div class="ml-3 truncate">
                        <h3 class="font-bold text-sm text-slate-950 dark:text-white truncate" x-text="selectedLead?.nome"></h3>
                        <p class="text-[10px] text-emerald-500 font-bold" x-text="selectedLead?.numero"></p>
                    </div>
                </div>
            </header>
            <div class="flex-1 overflow-y-auto p-4 space-y-4 bg-chat-pattern bg-[#efeae2] dark:bg-[#0b141a] bg-opacity-20 no-scrollbar" id="chat-box">
                <template x-for="msg in messages" :key="msg.id">
                    <div :class="msg.from_me ? 'justify-end' : 'justify-start'" class="flex w-full">
                        <div :class="msg.from_me ? 'bg-indigo-600 text-white rounded-l-2xl rounded-tr-2xl' : 'bg-white dark:bg-slate-800 dark:text-slate-200 rounded-r-2xl rounded-tl-2xl shadow-sm border border-gray-100 dark:border-slate-700'" class="p-3.5 max-w-[85%]">
                            <p class="text-sm font-medium leading-relaxed" x-text="msg.content"></p>
                        </div>
                    </div>
                </template>
            </div>
            <footer class="bg-white dark:bg-slate-900 border-t dark:border-slate-800 p-3 pb-safe shrink-0">
                <div class="flex items-center gap-2">
                    <input x-model="msgInput" @keydown.enter="sendMsg()" type="text" placeholder="Mensagem..." class="flex-1 bg-slate-50 dark:bg-slate-950 rounded-xl p-3 text-sm dark:text-white outline-none">
                    <button @click="sendMsg()" class="w-12 h-12 rounded-xl bg-indigo-600 flex items-center justify-center text-white"><i data-lucide="send" class="w-5 h-5"></i></button>
                </div>
            </footer>
        </div>

        <nav class="md:hidden fixed bottom-0 w-full glass flex justify-between items-center z-40 h-16 px-8 border-t dark:border-slate-800 pb-safe">
            <template x-for="item in navItems">
                <button @click="screen = item.id" :class="screen === item.id ? 'text-indigo-600 scale-110 font-black' : 'text-slate-400 font-bold'" class="flex flex-col items-center gap-1 transition-all">
                    <i :data-lucide="item.icon" class="w-5 h-5"></i><span class="text-[9px]" x-text="item.label"></span>
                </button>
            </template>
        </nav>
        
    </div>

    <script>
        function crmApp() {
            return {
                screen: 'kanban',
                isChatOpen: false,
                selectedLead: null,
                msgInput: '',
                leads: [],
                messages: [],
                botRules: [],
                newRule: { trigger: '', response: '' },
                isDarkMode: true,
                aiPrompt: '',
                aiLoading: false,
                geminiKey: 'AIzaSyB1b39dN1L8vN8ZadiHAEAtZEmm-sZLg7o',
                
                navItems: [
                    { id: 'dash', label: 'Dash', icon: 'pie-chart' }, 
                    { id: 'kanban', label: 'Funil', icon: 'columns' }, 
                    { id: 'bot', label: 'Robô', icon: 'bot' },
                    { id: 'disparo', label: 'Disparo', icon: 'zap' }
                ],
                
                disparoConfig: { status: 'todos', msg: '', minDelay: 30, maxDelay: 60, isRunning: false, sent: 0, total: 0, file: null },
                columns: [{ id: 'novo_lead', name: 'Triagem' }, { id: 'atendimento', name: 'Negócio' }, { id: 'proposta', name: 'Proposta' }, { id: 'fechado', name: 'Venda' }],
                
                async init() {
                    this.client = supabase.createClient('https://qhnbisjogpdoyszpsucs.supabase.co', 'sb_publishable_3PAly_BCdvoldAzm1Y7SxQ_S3rp2QhQ');
                    await this.loadLeads();
                    await this.loadBotRules();
                    this.setupRealtime();
                    setTimeout(() => lucide.createIcons(), 100);
                },

                toggleTheme() { this.isDarkMode = !this.isDarkMode; setTimeout(() => lucide.createIcons(), 50); },

                async loadLeads() {
                    const { data } = await this.client.from('leads').select('*').order('created_at', { ascending: false });
                    if (data) this.leads = data;
                    setTimeout(() => lucide.createIcons(), 50);
                },

                async loadBotRules() {
                    const { data } = await this.client.from('chatbot_rules').select('*').order('created_at', { ascending: false });
                    if(data) this.botRules = data;
                },

                async saveBotRule() {
                    if(!this.newRule.trigger || !this.newRule.response) return;
                    await this.client.from('chatbot_rules').insert({ trigger_text: this.newRule.trigger, response_text: this.newRule.response });
                    this.newRule = { trigger: '', response: '' };
                    this.loadBotRules();
                },

                async deleteBotRule(id) { await this.client.from('chatbot_rules').delete().eq('id', id); this.loadBotRules(); },

                async openChat(lead) {
                    this.selectedLead = lead; this.isChatOpen = true; this.messages = [];
                    const { data } = await this.client.from('messages').select('*').eq('lead_id', lead.id).order('timestamp', { ascending: true });
                    this.messages = data || []; this.scrollToBottom();
                },

                async sendMsg() {
                    if(!this.msgInput || !this.selectedLead) return;
                    const text = this.msgInput; this.msgInput = '';
                    await this.client.from('messages').insert({ lead_id: this.selectedLead.id, content: text, from_me: true });
                    await fetch('https://projeto-evolution-api.xtknqq.easypanel.host/message/sendText/igor', {
                        method: 'POST', headers: { 'apikey': '773C15E29974-4BA2-B003-3F697EC279AE', 'Content-Type': 'application/json' }, body: JSON.stringify({ "number": this.selectedLead.numero, "text": text })
                    });
                },

                // LÓGICA GEMINI IA
                async generateGeminiCopy() {
                    if (!this.aiPrompt) return;
                    this.aiLoading = true;
                    try {
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${this.geminiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: `Aja como um copywriter profissional. Crie uma mensagem curta de venda no WhatsApp para o produto: ${this.aiPrompt}. Use obrigatoriamente Spintax no formato {Olá|Oi|Tudo bem?}. Use {nome} para o nome do cliente. Retorne apenas o texto final da mensagem.` }] }]
                            })
                        });
                        const data = await res.json();
                        this.disparoConfig.msg = data.candidates[0].content.parts[0].text;
                    } catch (e) { alert('Erro na IA'); }
                    finally { this.aiLoading = false; }
                },

                async iniciarDisparo() {
                    let targets = this.disparoConfig.status === 'todos' ? this.leads : this.leads.filter(l => l.status === this.disparoConfig.status);
                    if (!targets.length) return alert('Sem leads nesta coluna.');

                    this.disparoConfig.isRunning = true;
                    this.disparoConfig.total = targets.length;
                    this.disparoConfig.sent = 0;

                    let mediaUrl = null; let mediaType = null;
                    if (this.disparoConfig.file) {
                        const f = this.disparoConfig.file;
                        const fName = `bulk_${Date.now()}_${f.name}`;
                        await this.client.storage.from('chat_media').upload(`bulk/${fName}`, f);
                        const { data } = this.client.storage.from('chat_media').getPublicUrl(`bulk/${fName}`);
                        mediaUrl = data.publicUrl;
                        mediaType = f.type.split('/')[0];
                    }

                    for (const lead of targets) {
                        if (!this.disparoConfig.isRunning) break;
                        try {
                            if (mediaUrl) {
                                let endpoint = mediaType === 'audio' ? 'sendWhatsAppAudio' : 'sendMedia';
                                let body = { number: lead.numero };
                                if(mediaType === 'audio') body.audio = mediaUrl;
                                else { body.media = mediaUrl; body.mediatype = (mediaType === 'application' ? 'document' : mediaType); body.fileName = this.disparoConfig.file.name; }
                                await fetch(`https://projeto-evolution-api.xtknqq.easypanel.host/message/${endpoint}/igor`, {
                                    method: 'POST', headers: { 'apikey': '773C15E29974-4BA2-B003-3F697EC279AE', 'Content-Type': 'application/json' }, body: JSON.stringify(body)
                                });
                            }
                            if (this.disparoConfig.msg) {
                                const msgFinal = this.disparoConfig.msg.replace(/{nome}/g, lead.nome.split(' ')[0]).replace(/{([^{}]+)}/g, (m,o) => o.split('|')[Math.floor(Math.random()*o.split('|').length)]);
                                await fetch('https://projeto-evolution-api.xtknqq.easypanel.host/message/sendText/igor', {
                                    method: 'POST', headers: { 'apikey': '773C15E29974-4BA2-B003-3F697EC279AE', 'Content-Type': 'application/json' }, body: JSON.stringify({ number: lead.numero, text: msgFinal })
                                });
                                await this.client.from('messages').insert({ lead_id: lead.id, content: msgFinal, from_me: true });
                            }
                        } catch (e) { console.error(e); }
                        this.disparoConfig.sent++;
                        if (this.disparoConfig.sent < this.disparoConfig.total) {
                            const delay = Math.floor(Math.random() * (this.disparoConfig.maxDelay - this.disparoConfig.minDelay + 1)) + parseInt(this.disparoConfig.minDelay);
                            await new Promise(r => setTimeout(r, delay * 1000));
                        }
                    }
                    this.disparoConfig.isRunning = false;
                },

                setupRealtime() {
                    this.client.channel('leads_channel').on('postgres_changes', { event: '*', schema: 'public', table: 'leads' }, () => this.loadLeads()).subscribe();
                    this.client.channel('msgs_channel').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                        if (this.isChatOpen && payload.new.lead_id === this.selectedLead?.id) {
                            if(!this.messages.find(m => m.id === payload.new.id)) { this.messages.push(payload.new); this.scrollToBottom(); }
                        }
                    }).subscribe();
                },

                async updateStatus(id, status) { await this.client.from('leads').update({ status }).eq('id', id); this.loadLeads(); },
                scrollToBottom() { setTimeout(() => { const b = document.getElementById('chat-box'); if(b) b.scrollTop = b.scrollHeight; }, 100); }
            }
        }
    </script>
</body>
</html>
