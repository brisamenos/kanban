<!DOCTYPE html>
<html lang="pt-br" x-data="crmEnterprise()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EvoCRM Enterprise | Igor Borges</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        [x-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .bg-chat { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; opacity: 0.1; }
        .kanban-col { min-width: 320px; height: calc(100vh - 220px); }
        .sidebar-active { background: rgba(99, 102, 241, 0.1); color: #818cf8; border-right: 3px solid #6366f1; }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 antialiased overflow-hidden font-sans">

    <div class="flex h-screen w-full">
        <aside class="w-64 bg-slate-900/50 border-r border-slate-800 flex flex-col hidden md:flex">
            <div class="p-6 flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <i data-lucide="zap" class="text-white w-6 h-6"></i>
                </div>
                <h1 class="font-black text-lg tracking-tighter">EVO<span class="text-indigo-500">PRO</span></h1>
            </div>

            <nav class="flex-1 px-4 space-y-2 overflow-y-auto no-scrollbar">
                <p class="text-[10px] font-black text-slate-500 uppercase px-4 mb-2">Menu Principal</p>
                <button @click="screen = 'dash'" :class="screen === 'dash' && 'sidebar-active'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold transition-all text-slate-400 hover:bg-slate-800">
                    <i data-lucide="bar-chart-3" class="w-5 h-5"></i> Dashboard
                </button>
                <button @click="screen = 'kanban'" :class="screen === 'kanban' && 'sidebar-active'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold transition-all text-slate-400 hover:bg-slate-800">
                    <i data-lucide="trello" class="w-5 h-5"></i> Kanban
                </button>
                <button @click="screen = 'campanhas'" :class="screen === 'campanhas' && 'sidebar-active'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold transition-all text-slate-400 hover:bg-slate-800">
                    <i data-lucide="megaphone" class="w-5 h-5"></i> Campanhas
                </button>
                <button @click="screen = 'biblioteca'" :class="screen === 'biblioteca' && 'sidebar-active'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold transition-all text-slate-400 hover:bg-slate-800">
                    <i data-lucide="folder-open" class="w-5 h-5"></i> Mídias
                </button>
                <button @click="screen = 'usuarios'" :class="screen === 'usuarios' && 'sidebar-active'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold transition-all text-slate-400 hover:bg-slate-800">
                    <i data-lucide="users" class="w-5 h-5"></i> Atendentes
                </button>
            </nav>

            <div class="p-6 border-t border-slate-800">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-indigo-500 flex items-center justify-center font-bold text-xs text-white">IB</div>
                    <div class="flex-1 overflow-hidden">
                        <p class="text-xs font-bold truncate">Igor Borges</p>
                        <p class="text-[10px] text-emerald-500 font-black uppercase">Online</p>
                    </div>
                    <button class="text-slate-500"><i data-lucide="log-out" class="w-4 h-4"></i></button>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative bg-[#020617]">
            <header class="h-16 border-b border-slate-800 px-8 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <button class="md:hidden text-slate-400"><i data-lucide="menu"></i></button>
                    <h2 class="font-bold text-sm uppercase tracking-widest text-slate-400" x-text="screen"></h2>
                </div>
                <div class="flex items-center gap-6">
                    <div class="flex items-center gap-2 bg-slate-900 px-3 py-1.5 rounded-lg border border-slate-800">
                        <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                        <span class="text-[10px] font-black text-slate-400">WHATSAPP CONECTADO</span>
                    </div>
                </div>
            </header>

            <section class="flex-1 overflow-y-auto p-8 no-scrollbar">
                
                <div x-show="screen === 'dash'" x-cloak class="space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                        <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl shadow-2xl">
                            <p class="text-slate-500 text-[10px] font-black uppercase mb-2">Total de Leads</p>
                            <h3 class="text-4xl font-black" x-text="leads.length">0</h3>
                        </div>
                        <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl shadow-2xl border-l-4 border-l-indigo-500">
                            <p class="text-slate-500 text-[10px] font-black uppercase mb-2">Ganhos Estimados</p>
                            <h3 class="text-4xl font-black">R$ <span x-text="leads.reduce((a, b) => a + (b.valor_estimado || 0), 0)">0</span></h3>
                        </div>
                        <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl shadow-2xl border-l-4 border-l-emerald-500">
                            <p class="text-slate-500 text-[10px] font-black uppercase mb-2">Vendas (Mês)</p>
                            <h3 class="text-4xl font-black" x-text="leads.filter(l => l.status === 'fechado').length">0</h3>
                        </div>
                        <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl shadow-2xl border-l-4 border-l-amber-500">
                            <p class="text-slate-500 text-[10px] font-black uppercase mb-2">Tempo Médio</p>
                            <h3 class="text-4xl font-black">12m</h3>
                        </div>
                    </div>
                </div>

                <div x-show="screen === 'kanban'" x-cloak class="flex gap-6 overflow-x-auto pb-10 no-scrollbar">
                    <template x-for="col in columns" :key="col.id">
                        <div class="kanban-col flex flex-col gap-4" @dragover.prevent @drop="updateStatus($event.dataTransfer.getData('id'), col.id)">
                            <div class="flex items-center justify-between px-2">
                                <div class="flex items-center gap-2">
                                    <div class="w-1.5 h-6 rounded-full" :class="col.color"></div>
                                    <span class="text-xs font-black uppercase tracking-widest text-slate-400" x-text="col.name"></span>
                                </div>
                                <span class="text-[10px] bg-slate-800 px-2 py-0.5 rounded text-slate-500" x-text="leads.filter(l => l.status === col.id).length"></span>
                            </div>
                            <div class="flex-1 overflow-y-auto flex flex-col gap-3 no-scrollbar">
                                <template x-for="lead in leads.filter(l => l.status === col.id)" :key="lead.id">
                                    <div draggable="true" @dragstart="$event.dataTransfer.setData('id', lead.id)" @click="openChat(lead)" 
                                         class="bg-slate-900 border border-slate-800 p-5 rounded-2xl hover:border-indigo-500/50 transition-all cursor-pointer shadow-lg group">
                                        <div class="flex justify-between items-start mb-4">
                                            <h4 class="font-bold text-sm group-hover:text-indigo-400" x-text="lead.nome"></h4>
                                            <i data-lucide="more-horizontal" class="w-4 h-4 text-slate-700"></i>
                                        </div>
                                        <div class="flex flex-wrap gap-1 mb-4">
                                            <template x-for="tag in lead.tags || []">
                                                <span class="text-[8px] bg-indigo-500/10 text-indigo-400 px-2 py-0.5 rounded font-bold uppercase" x-text="tag"></span>
                                            </template>
                                        </div>
                                        <div class="flex justify-between items-center text-[10px] text-slate-500">
                                            <span class="flex items-center gap-1"><i data-lucide="phone" class="w-3 h-3"></i> <span x-text="lead.numero"></span></span>
                                            <div class="w-5 h-5 rounded-full bg-slate-800 flex items-center justify-center border border-slate-700">IB</div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>

                <div x-show="screen === 'biblioteca'" x-cloak class="grid grid-cols-2 md:grid-cols-6 gap-6">
                    <template x-for="media in library" :key="media.id">
                        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 text-center group cursor-pointer hover:border-indigo-500 transition-all">
                            <div class="h-24 flex items-center justify-center mb-3">
                                <i data-lucide="file-text" class="w-10 h-10 text-slate-700 group-hover:text-indigo-500"></i>
                            </div>
                            <p class="text-[10px] font-bold truncate" x-text="media.name"></p>
                            <button @click="sendMedia(media.url)" class="mt-2 text-[9px] bg-indigo-600 px-3 py-1 rounded-full text-white font-bold opacity-0 group-hover:opacity-100 transition-opacity">ENVIAR</button>
                        </div>
                    </template>
                    <div class="bg-slate-900/50 border-2 border-dashed border-slate-800 rounded-2xl flex flex-col items-center justify-center gap-2 cursor-pointer hover:bg-slate-800 transition-all">
                        <i data-lucide="upload" class="w-6 h-6 text-slate-600"></i>
                        <span class="text-[10px] font-bold text-slate-500">UPLOAD</span>
                    </div>
                </div>

            </section>
        </main>

        <div x-show="isChatOpen" x-transition x-cloak class="fixed inset-y-0 right-0 w-full md:w-[450px] bg-slate-900 border-l border-slate-800 z-[100] flex flex-col shadow-2xl shadow-black">
            <header class="p-6 border-b border-slate-800 flex items-center justify-between bg-slate-900/80 backdrop-blur-md">
                <div class="flex items-center gap-4">
                    <button @click="isChatOpen = false" class="p-2 hover:bg-slate-800 rounded-lg"><i data-lucide="chevron-right"></i></button>
                    <div>
                        <h3 class="font-bold text-base" x-text="selectedLead?.nome"></h3>
                        <p class="text-[10px] text-emerald-500 font-black uppercase tracking-widest flex items-center gap-1">
                            <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full"></span> Aberto agora
                        </p>
                    </div>
                </div>
                <button class="p-2 text-slate-500 hover:text-white"><i data-lucide="settings-2" class="w-5 h-5"></i></button>
            </header>

            <div class="flex-1 bg-chat overflow-y-auto p-6 space-y-4 no-scrollbar" id="chat-box">
                <template x-for="msg in messages" :key="msg.id">
                    <div :class="msg.from_me ? 'justify-end' : 'justify-start'" class="flex w-full animate-in fade-in slide-in-from-bottom-2 duration-300">
                        <div :class="msg.from_me ? 'bg-indigo-600 rounded-2xl rounded-tr-none' : 'bg-slate-800 rounded-2xl rounded-tl-none'" 
                             class="p-4 max-w-[85%] shadow-xl border border-white/5">
                            <p class="text-sm leading-relaxed" x-text="msg.content"></p>
                            <div class="flex items-center justify-end gap-1 mt-2 opacity-40">
                                <span class="text-[8px] font-bold uppercase" x-text="new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})"></span>
                                <template x-if="msg.from_me"><i data-lucide="check-check" class="w-3 h-3 text-white"></i></template>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <footer class="p-6 bg-slate-900 border-t border-slate-800 flex flex-col gap-4">
                <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                    <button @click="msgInput = 'Olá, como posso ajudar?'" class="bg-slate-800 px-3 py-1.5 rounded-lg text-[9px] font-bold uppercase hover:bg-indigo-600 transition-colors">👋 Saudação</button>
                    <button @click="msgInput = 'Aqui está sua proposta solar!'" class="bg-slate-800 px-3 py-1.5 rounded-lg text-[9px] font-bold uppercase hover:bg-indigo-600 transition-colors">☀️ Proposta</button>
                    <button @click="msgInput = 'Qual o seu CEP?'" class="bg-slate-800 px-3 py-1.5 rounded-lg text-[9px] font-bold uppercase hover:bg-indigo-600 transition-colors">📍 CEP</button>
                </div>
                <div class="flex gap-3 items-center">
                    <button class="text-slate-500 hover:text-white"><i data-lucide="paperclip" class="w-5 h-5"></i></button>
                    <input x-model="msgInput" @keydown.enter="sendMsg()" type="text" placeholder="Envie sua proposta..." class="flex-1 bg-slate-800 border-none rounded-xl px-5 py-3.5 text-sm focus:ring-2 focus:ring-indigo-500 transition-all outline-none">
                    <button @click="sendMsg()" class="bg-indigo-600 p-3.5 rounded-xl hover:bg-indigo-500 transition-all active:scale-95 shadow-lg shadow-indigo-500/20">
                        <i data-lucide="send" class="w-5 h-5 text-white"></i>
                    </button>
                </div>
            </footer>
        </div>
    </div>

    <script>
        function crmEnterprise() {
            return {
                screen: 'dash',
                isChatOpen: false,
                selectedLead: null,
                msgInput: '',
                leads: [],
                messages: [],
                library: [
                    { id: 1, name: 'Proposta Solar PDF', url: 'https://...' },
                    { id: 2, name: 'Vídeo Institucional', url: 'https://...' },
                    { id: 3, name: 'Áudio Apresentação', url: 'https://...' }
                ],
                columns: [
                    { id: 'novo_lead', name: 'Triagem / IA', color: 'bg-amber-500' },
                    { id: 'atendimento', name: 'Em Conversa', color: 'bg-indigo-500' },
                    { id: 'proposta', name: 'Aguardando Pix', color: 'bg-emerald-500' },
                    { id: 'fechado', name: 'Venda Concluída', color: 'bg-slate-600' }
                ],
                
                async init() {
                    const SB_URL = 'https://qhnbisjogpdoyszpsucs.supabase.co';
                    const SB_KEY = 'sb_publishable_3PAly_BCdvoldAzm1Y7SxQ_S3rp2QhQ';
                    this.client = supabase.createClient(SB_URL, SB_KEY);
                    
                    await this.loadLeads();
                    this.setupRealtime();
                    lucide.createIcons();
                },

                async loadLeads() {
                    const { data } = await this.client.from('leads').select('*').order('created_at', { ascending: false });
                    if (data) {
                        this.leads = data;
                        setTimeout(() => lucide.createIcons(), 100);
                    }
                },

                setupRealtime() {
                    this.client.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'leads' }, () => this.loadLeads()).subscribe();
                    this.client.channel('msgs').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                        if (this.isChatOpen && payload.new.lead_id === this.selectedLead.id) {
                            this.messages.push(payload.new);
                            this.scrollToBottom();
                        }
                    }).subscribe();
                },

                async updateStatus(leadId, newStatus) {
                    if(!leadId) return;
                    await this.client.from('leads').update({ status: newStatus }).eq('id', leadId);
                },

                async openChat(lead) {
                    this.selectedLead = lead;
                    this.isChatOpen = true;
                    this.messages = [];
                    const { data } = await this.client.from('messages').select('*').eq('lead_id', lead.id).order('timestamp', { ascending: true });
                    this.messages = data || [];
                    this.scrollToBottom();
                    setTimeout(() => lucide.createIcons(), 100);
                },

                async sendMsg() {
                    if(!this.msgInput || !this.selectedLead) return;
                    const text = this.msgInput;
                    this.msgInput = '';

                    const EVO_URL = 'https://projeto-evolution-api.xtknqq.easypanel.host';
                    const API_KEY = '773C15E29974-4BA2-B003-3F697EC279AE';
                    const INSTANCE = 'igor';

                    await fetch(`${EVO_URL}/message/sendText/${INSTANCE}`, {
                        method: 'POST',
                        headers: { 'apikey': API_KEY, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ "number": this.selectedLead.numero, "text": text })
                    });
                },

                scrollToBottom() {
                    setTimeout(() => { const b = document.getElementById('chat-box'); if(b) b.scrollTop = b.scrollHeight; }, 100);
                }
            }
        }
    </script>
</body>
</html>
