<!DOCTYPE html>
<html lang="pt-br" x-data="crmApp()" :class="{ 'dark': isDarkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EvoCRM Pro | Igor Borges</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: {
                    colors: {
                        panel: { light: '#FFFFFF', dark: '#0f172a' },
                        bg: { light: '#f8fafc', dark: '#020617' },
                    }
                } 
            }
        }
    </script>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://bernardo-castilho.github.io/DragDropTouch/DragDropTouch.js"></script>

    <style>
        [x-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .kanban-col { min-width: 88vw; max-width: 88vw; height: calc(100vh - 180px); scroll-snap-align: center; }
        @media (min-width: 768px) { .kanban-col { min-width: 320px; max-width: 320px; height: calc(100vh - 200px); } }
        .kanban-container { scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
        .glass { background: rgba(255, 255, 255, 0.9) !important; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .dark .glass { background: rgba(15, 23, 42, 0.9) !important; }
        .bg-chat-pattern { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .pt-safe { padding-top: env(safe-area-inset-top); }
        body { touch-action: pan-y; overscroll-behavior-y: contain; }
    </style>
</head>
<body class="bg-bg-light text-slate-800 dark:bg-bg-dark dark:text-slate-200 antialiased font-sans overflow-hidden transition-colors duration-300">

    <div class="flex h-screen w-full relative pt-safe">
        
        <aside class="w-64 glass border-r hidden md:flex flex-col z-20">
            <div class="p-6 flex items-center gap-3 border-b border-gray-100 dark:border-slate-800/50">
                <div class="w-9 h-9 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-500/40">
                    <i data-lucide="zap" class="text-white w-5 h-5"></i>
                </div>
                <h1 class="font-black text-xl tracking-tighter dark:text-white">EVO<span class="text-indigo-500">PRO</span></h1>
            </div>
            <nav class="flex-1 px-4 space-y-1.5 mt-4">
                <template x-for="item in navItems">
                    <button @click="screen = item.id" :class="screen === item.id ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-500 dark:text-slate-400 hover:bg-gray-100 dark:hover:bg-slate-800'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold transition-all">
                        <i :data-lucide="item.icon" class="w-4 h-4"></i> <span x-text="item.label"></span>
                    </button>
                </template>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col relative w-full h-full overflow-hidden">
            <header class="h-14 md:h-20 px-4 md:px-10 flex items-center justify-between glass border-b shrink-0 z-10">
                <div class="flex items-center gap-2">
                    <div class="md:hidden w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center shadow-md"><i data-lucide="zap" class="text-white w-4 h-4"></i></div>
                    <h2 class="font-black text-base md:text-xl tracking-tight dark:text-white" x-text="navItems.find(i => i.id === screen)?.label || 'CRM'"></h2>
                </div>
                <button @click="toggleTheme()" class="p-2 text-slate-500 dark:text-slate-300"><i :data-lucide="isDarkMode ? 'sun' : 'moon'" class="w-5 h-5"></i></button>
            </header>

            <section class="flex-1 overflow-y-auto p-3 md:p-8 no-scrollbar">
                
                <div x-show="screen === 'dash'" x-cloak class="grid grid-cols-2 gap-3">
                    <div class="bg-white dark:bg-slate-900 p-5 rounded-3xl border border-gray-100 dark:border-slate-800 shadow-sm text-center">
                        <p class="text-slate-500 text-[10px] font-black uppercase mb-1">Leads</p>
                        <h3 class="text-3xl font-black dark:text-white" x-text="leads.length">0</h3>
                    </div>
                    <div class="bg-white dark:bg-slate-900 p-5 rounded-3xl border border-gray-100 dark:border-slate-800 border-b-4 border-b-emerald-500 shadow-sm text-center">
                        <p class="text-slate-500 text-[10px] font-black uppercase mb-1">Vendas</p>
                        <h3 class="text-3xl font-black dark:text-white" x-text="leads.filter(l => l.status === 'fechado').length">0</h3>
                    </div>
                </div>

                <div x-show="screen === 'kanban'" x-cloak class="flex gap-4 overflow-x-auto pb-4 no-scrollbar kanban-container h-full">
                    <template x-for="col in columns" :key="col.id">
                        <div class="kanban-col flex flex-col gap-3 bg-slate-200/40 dark:bg-slate-900/40 p-3 rounded-[2rem]" @dragover.prevent @drop="updateStatus($event.dataTransfer.getData('id'), col.id)">
                            <div class="flex items-center justify-between px-2">
                                <span class="text-[10px] font-black uppercase text-slate-500" x-text="col.name"></span>
                                <span class="text-[10px] bg-white dark:bg-slate-800 px-2 py-1 rounded-full font-bold dark:text-white shadow-sm" x-text="leads.filter(l => l.status === col.id).length"></span>
                            </div>
                            <div class="flex-1 overflow-y-auto flex flex-col gap-3 no-scrollbar">
                                <template x-for="lead in leads.filter(l => l.status === col.id)" :key="lead.id">
                                    <div draggable="true" @dragstart="$event.dataTransfer.setData('id', lead.id)" @click="openChat(lead)" class="bg-white dark:bg-slate-800 p-3 rounded-2xl shadow-sm border border-gray-100 dark:border-slate-700/50 active:scale-[0.98]">
                                        <div class="flex items-center gap-3">
                                            <div class="relative flex-shrink-0">
                                                <img :src="lead.foto_url || 'https://api.dicebear.com/8.x/notionists/svg?seed=' + lead.nome" class="w-10 h-10 rounded-xl object-cover bg-slate-100" @error="$el.src = 'https://api.dicebear.com/8.x/notionists/svg?seed=' + lead.nome">
                                                <div class="absolute -bottom-1 -right-1 w-3 h-3 bg-emerald-500 border-2 border-white dark:border-slate-800 rounded-full"></div>
                                            </div>
                                            <div class="flex-1 overflow-hidden">
                                                <h4 class="font-bold text-sm text-slate-900 dark:text-white truncate" x-text="lead.nome"></h4>
                                                <p class="text-[10px] text-slate-500" x-text="lead.numero"></p>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>

                <div x-show="screen === 'bot'" x-cloak class="max-w-xl mx-auto space-y-4 pb-20">
                    <div class="bg-indigo-600 p-6 rounded-[2rem] shadow-lg text-white">
                        <h3 class="font-black text-lg mb-2 flex items-center gap-2"><i data-lucide="sparkles"></i> Treinamento da IA</h3>
                        <p class="text-[11px] opacity-80 mb-4 font-medium uppercase tracking-widest">Descreva seu produto para a IA gerar textos (Chat e Disparo)</p>
                        <textarea x-model="aiProductContext" placeholder="Ex: Vendo um curso de emagrecimento para mulheres, custa 197 reais, foco em dietas de 21 dias..." rows="3" class="w-full bg-white/10 border border-white/20 rounded-xl p-4 text-sm text-white placeholder:text-white/50 outline-none"></textarea>
                    </div>

                    <div class="bg-white dark:bg-slate-900 p-6 rounded-[2rem] border dark:border-slate-800 shadow-sm">
                        <h3 class="font-black text-lg mb-4 dark:text-white">Criar Regra</h3>
                        <div class="space-y-3">
                            <input x-model="newRule.trigger" type="text" placeholder="Se o cliente disser..." class="w-full bg-slate-50 dark:bg-slate-950 border dark:border-slate-800 rounded-xl p-4 text-sm dark:text-white outline-none">
                            <textarea x-model="newRule.response" placeholder="O robô responde..." rows="3" class="w-full bg-slate-50 dark:bg-slate-950 border dark:border-slate-800 rounded-xl p-4 text-sm dark:text-white outline-none"></textarea>
                            <input type="file" x-ref="botFile" class="hidden" @change="botMediaFile = $event.target.files[0]">
                            <button @click="$refs.botFile.click()" class="text-xs font-bold text-indigo-500 flex items-center gap-2"><i data-lucide="paperclip" class="w-4 h-4"></i> Anexar Mídia</button>
                            <span x-show="botMediaFile" class="text-[10px] text-emerald-500 font-bold" x-text="botMediaFile?.name"></span>
                            <button @click="saveBotRule()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-xl shadow-md">Salvar Regra</button>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <template x-for="rule in botRules" :key="rule.id">
                            <div class="bg-white dark:bg-slate-900 p-4 rounded-2xl flex justify-between items-center border dark:border-slate-800 shadow-sm">
                                <div class="flex-1 pr-4">
                                    <div class="flex gap-2 mb-1">
                                        <span class="text-[9px] bg-indigo-50 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-300 px-2 py-1 rounded-full font-black uppercase" x-text="rule.trigger_text"></span>
                                        <span x-show="rule.media_url" class="text-[9px] bg-emerald-50 text-emerald-600 px-2 py-1 rounded-full font-black uppercase">Com Mídia</span>
                                    </div>
                                    <p class="text-xs text-slate-600 dark:text-slate-400 line-clamp-1" x-text="rule.response_text || 'Apenas mídia'"></p>
                                </div>
                                <button @click="deleteBotRule(rule.id)" class="text-red-400 p-2"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </template>
                    </div>
                </div>

                <div x-show="screen === 'disparo'" x-cloak class="max-w-xl mx-auto space-y-4 pb-20">
                    <div class="bg-white dark:bg-slate-900 p-6 rounded-[2rem] border dark:border-slate-800 shadow-sm">
                        <h3 class="font-black text-lg mb-4 dark:text-white flex items-center gap-2">
                            <i data-lucide="send" class="w-5 h-5 text-indigo-500"></i> Disparo em Massa PRO
                        </h3>
                        
                        <div class="space-y-4">
                            <div>
                                <label class="text-[10px] font-black uppercase text-slate-500 mb-1 block">Público Alvo (Funil)</label>
                                <select x-model="disparoConfig.status" :disabled="disparoConfig.isRunning" class="w-full bg-slate-50 dark:bg-slate-950 border dark:border-slate-800 rounded-xl p-3 text-sm dark:text-white outline-none">
                                    <option value="todos">Todos os Leads</option>
                                    <template x-for="col in columns" :key="col.id">
                                        <option :value="col.id" x-text="col.name"></option>
                                    </template>
                                </select>
                            </div>

                            <div>
                                <div class="flex items-center justify-between mb-1">
                                    <label class="text-[10px] font-black uppercase text-slate-500 block">Mensagem de Texto (Opcional)</label>
                                    <button @click="gerarTextoDisparoIA()" :disabled="aiLoadingDisparo" class="text-xs font-bold text-indigo-500 hover:text-indigo-600 flex items-center gap-1 disabled:opacity-50 transition-all">
                                        <i :data-lucide="aiLoadingDisparo ? 'loader-2' : 'sparkles'" :class="aiLoadingDisparo ? 'animate-spin' : ''" class="w-3 h-3"></i>
                                        Gerar Copy com IA
                                    </button>
                                </div>
                                <textarea x-model="disparoConfig.msg" :disabled="disparoConfig.isRunning" rows="4" placeholder="{Oi|Olá} {nome}, tudo bem?" class="w-full bg-slate-50 dark:bg-slate-950 border dark:border-slate-800 rounded-xl p-4 text-sm dark:text-white outline-none"></textarea>
                            </div>

                            <div class="p-4 bg-slate-50 dark:bg-slate-950 rounded-2xl border dark:border-slate-800">
                                <label class="text-[10px] font-black uppercase text-slate-500 mb-2 block text-center">Anexar Mídia ao Disparo</label>
                                <div class="flex justify-center gap-4">
                                    <input type="file" x-ref="disparoFile" class="hidden" @change="disparoConfig.file = $event.target.files[0]">
                                    <button @click="$refs.disparoFile.click()" :class="disparoConfig.file ? 'text-indigo-600 bg-indigo-50' : 'text-slate-400'" class="flex flex-col items-center p-2 rounded-xl transition-all">
                                        <i data-lucide="upload-cloud" class="w-6 h-6"></i>
                                        <span class="text-[10px] font-bold mt-1" x-text="disparoConfig.file ? 'Alterar' : 'Selecionar'"></span>
                                    </button>
                                    <div x-show="disparoConfig.file" class="flex flex-col justify-center">
                                        <span class="text-[10px] font-black text-slate-700 dark:text-white truncate max-w-[150px]" x-text="disparoConfig.file?.name"></span>
                                        <button @click="disparoConfig.file = null" class="text-[9px] text-red-500 font-bold text-left">Remover</button>
                                    </div>
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="text-[10px] font-black uppercase text-slate-500 mb-1 block">Delay Min (seg)</label>
                                    <input x-model="disparoConfig.minDelay" type="number" class="w-full bg-slate-50 dark:bg-slate-950 border dark:border-slate-800 rounded-xl p-3 text-sm dark:text-white outline-none">
                                </div>
                                <div>
                                    <label class="text-[10px] font-black uppercase text-slate-500 mb-1 block">Delay Max (seg)</label>
                                    <input x-model="disparoConfig.maxDelay" type="number" class="w-full bg-slate-50 dark:bg-slate-950 border dark:border-slate-800 rounded-xl p-3 text-sm dark:text-white outline-none">
                                </div>
                            </div>

                            <div x-show="disparoConfig.isRunning || disparoConfig.sent > 0" class="bg-indigo-50 dark:bg-indigo-900/30 p-4 rounded-2xl border border-indigo-100 dark:border-indigo-800">
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-xs font-bold text-indigo-600 dark:text-indigo-300" x-text="disparoConfig.isRunning ? '🔥 Disparando...' : '✅ Finalizado'"></span>
                                    <span class="text-xs font-black text-indigo-600 dark:text-indigo-300" x-text="`${disparoConfig.sent} / ${disparoConfig.total}`"></span>
                                </div>
                                <div class="w-full bg-indigo-200 dark:bg-indigo-950 rounded-full h-2 overflow-hidden">
                                    <div class="bg-indigo-600 h-2 rounded-full transition-all duration-500" :style="`width: ${(disparoConfig.sent / disparoConfig.total) * 100}%`"></div>
                                </div>
                            </div>

                            <button x-show="!disparoConfig.isRunning" @click="iniciarDisparo()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
                                <i data-lucide="play" class="w-4 h-4"></i> Iniciar Campanha
                            </button>
                            
                            <button x-show="disparoConfig.isRunning" @click="pararDisparo()" class="w-full bg-red-500 text-white font-black py-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
                                <i data-lucide="square" class="w-4 h-4"></i> Pausar Disparo
                            </button>
                        </div>
                    </div>
                </div>

            </section>
        </main>

        <div x-show="isChatOpen" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0" x-transition:leave="transition ease-in duration-150" x-transition:leave-start="translate-x-0" x-transition:leave-end="translate-x-full" x-cloak 
             class="fixed inset-0 bg-white dark:bg-slate-950 z-[100] flex flex-col md:left-auto md:right-0 md:w-[450px] md:border-l dark:border-slate-800">
            
            <header class="h-16 px-4 border-b dark:border-slate-800 flex items-center bg-white dark:bg-slate-900 shrink-0 justify-between">
                <div class="flex items-center overflow-hidden">
                    <button @click="isChatOpen = false" class="p-2 -ml-2 mr-1 text-slate-400"><i data-lucide="arrow-left" class="w-6 h-6"></i></button>
                    <img :src="selectedLead?.foto_url || 'https://api.dicebear.com/8.x/notionists/svg?seed=' + selectedLead?.nome" class="w-9 h-9 rounded-xl border dark:border-slate-700">
                    <div class="ml-3 truncate">
                        <h3 class="font-bold text-sm text-slate-950 dark:text-white truncate" x-text="selectedLead?.nome"></h3>
                        <p class="text-[10px] text-emerald-500 font-bold" x-text="selectedLead?.numero"></p>
                    </div>
                </div>
                <select x-model="selectedLeadStatus" @change="updateStatus(selectedLead.id, $event.target.value)" class="bg-slate-100 dark:bg-slate-800 text-[9px] font-black uppercase p-2 rounded-xl outline-none dark:text-white">
                    <template x-for="col in columns" :key="col.id"><option :value="col.id" x-text="col.name"></option></template>
                </select>
            </header>

            <div class="absolute inset-0 top-16 bottom-[150px] bg-[#efeae2] dark:bg-[#0b141a] bg-chat-pattern opacity-30 dark:opacity-10 -z-0"></div>
            
            <div class="flex-1 overflow-y-auto p-4 space-y-4 z-10 no-scrollbar scroll-smooth" id="chat-box">
                <template x-for="msg in messages" :key="msg.id">
                    <div :class="msg.from_me ? 'justify-end' : 'justify-start'" class="flex w-full">
                        <div :class="msg.from_me ? 'bg-indigo-600 text-white rounded-l-2xl rounded-tr-2xl' : 'bg-white dark:bg-slate-800 dark:text-slate-200 rounded-r-2xl rounded-tl-2xl shadow-sm'" class="p-3.5 max-w-[85%] relative">
                            <template x-if="msg.content && msg.content.includes('http') && (msg.content.includes('chat_media') || msg.content.includes('[Áudio]') || msg.content.includes('[IMAGE]') || msg.content.includes('[VIDEO]') || msg.content.includes('[DOCUMENT]'))">
                                <a :href="msg.content.split(' ').pop()" target="_blank" class="underline text-xs font-bold block" :class="msg.from_me ? 'text-indigo-100' : 'text-indigo-500'"><i data-lucide="external-link" class="w-3 h-3 inline"></i> Abrir Arquivo</a>
                            </template>
                            <template x-if="msg.content && !msg.content.includes('chat_media') && !msg.content.includes('[IMAGE]')"><p class="text-sm font-medium leading-relaxed break-words" x-text="msg.content"></p></template>
                            <div class="flex justify-end mt-1 opacity-50"><span class="text-[9px] font-black" x-text="new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})"></span></div>
                        </div>
                    </div>
                </template>
            </div>

            <footer class="bg-white dark:bg-slate-900 border-t dark:border-slate-800 p-3 z-10 pb-safe shrink-0">
                <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                    <template x-for="rule in botRules" :key="rule.id">
                        <button @click="triggerBotRuleManual(rule)" class="shrink-0 bg-indigo-50 dark:bg-indigo-900/40 text-[9px] font-black px-3 py-1.5 rounded-full text-indigo-600 dark:text-indigo-300 border border-indigo-100 dark:border-indigo-800">🤖 <span x-text="rule.trigger_text"></span></button>
                    </template>
                </div>
                <div class="flex items-center gap-2">
                    <div class="flex">
                        <input type="file" x-ref="iI" class="hidden" @change="uploadAndSend($event, 'image')"><input type="file" x-ref="aI" class="hidden" @change="uploadAndSend($event, 'audio')"><input type="file" x-ref="dI" class="hidden" @change="uploadAndSend($event, 'document')">
                        <button @click="$refs.iI.click()" class="p-2 text-slate-400"><i data-lucide="image" class="w-5 h-5"></i></button>
                        <button @click="$refs.aI.click()" class="p-2 text-slate-400"><i data-lucide="mic" class="w-6 h-6"></i></button>
                        <button @click="$refs.dI.click()" class="p-2 text-slate-400"><i data-lucide="file-text" class="w-6 h-6"></i></button>
                    </div>
                    <div class="flex-1 bg-slate-50 dark:bg-slate-950 rounded-xl flex items-center px-3 border dark:border-slate-800 relative">
                        <input x-model="msgInput" @keydown.enter="sendMsg()" type="text" placeholder="Mensagem..." class="w-full bg-transparent py-3 text-sm dark:text-white outline-none pr-8">
                        <button @click="gerarRespostaIA()" :disabled="aiLoading" class="absolute right-2 p-1.5 text-indigo-500 hover:text-indigo-600 disabled:opacity-50">
                            <i :data-lucide="aiLoading ? 'loader-2' : 'sparkles'" :class="aiLoading ? 'animate-spin' : ''" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <button @click="sendMsg()" class="w-12 h-12 rounded-xl bg-indigo-600 flex items-center justify-center text-white active:scale-90 shadow-md"><i data-lucide="send" class="w-5 h-5"></i></button>
                </div>
            </footer>
        </div>

        <nav class="md:hidden fixed bottom-0 w-full glass flex justify-between items-center z-40 h-16 px-8 border-t dark:border-slate-800 pb-safe">
            <template x-for="item in navItems">
                <button @click="screen = item.id" :class="screen === item.id ? 'text-indigo-600 scale-110 font-black' : 'text-slate-400'" class="flex flex-col items-center gap-1 transition-all">
                    <i :data-lucide="item.icon" class="w-5 h-5"></i><span class="text-[9px]" x-text="item.label"></span>
                </button>
            </template>
        </nav>
    </div>

    <script>
        function crmApp() {
            return {
                screen: 'kanban', isChatOpen: false, selectedLead: null, selectedLeadStatus: '', msgInput: '', leads: [], messages: [], botRules: [], newRule: { trigger: '', response: '' }, botMediaFile: null,
                isDarkMode: localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches),
                
                geminiKey: 'AIzaSyCtAxBjtHLyJ_txhbK5pIAOc09Kc7ynpKo',
                aiProductContext: localStorage.getItem('aiContext') || '',
                aiLoading: false,
                aiLoadingDisparo: false,

                navItems: [
                    { id: 'dash', label: 'Dash', icon: 'pie-chart' }, 
                    { id: 'kanban', label: 'Funil', icon: 'columns' }, 
                    { id: 'bot', label: 'Robô', icon: 'bot' },
                    { id: 'disparo', label: 'Disparo', icon: 'send' }
                ],
                
                disparoConfig: { status: 'todos', msg: '', minDelay: 30, maxDelay: 60, isRunning: false, sent: 0, total: 0, file: null },
                
                columns: [{ id: 'novo_lead', name: 'Triagem' }, { id: 'atendimento', name: 'Negócio' }, { id: 'proposta', name: 'Proposta' }, { id: 'fechado', name: 'Venda' }],
                
                async init() {
                    const SB_URL = 'https://qhnbisjogpdoyszpsucs.supabase.co';

                    this.aiLoadingDisparo = true;
                    try {
                        const prompt = `
                        Aja como um especialista em copywriting e vendas pelo WhatsApp.
                        Eu vou fazer um disparo em massa para meus leads e preciso de uma copy de vendas.
                        
                        Contexto do meu Produto/Oferta: ${this.aiProductContext || 'Vendas gerais'}
                        
                        Crie UMA única mensagem persuasiva, engajadora e curta para enviar no WhatsApp.
                        OBRIGATÓRIO: Use a tag {nome} para se referir ao cliente.
                        Use o formato de spintax no início da mensagem, exemplo: {Oi|Olá|Opa} {nome},
                        
                        Foque em gerar curiosidade, quebrar uma objeção ou fazer uma oferta clara.
                        Não use emojis em excesso (máximo 2). 
                        Retorne APENAS o texto final da mensagem, sem aspas, sem introduções e sem explicações.
                        `;

                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${this.geminiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                        });

                        const data = await response.json();

                        if (!response.ok || data.error) {
                            console.error("Erro da API:", data.error);
                            alert(`Ops! A API do Gemini recusou o pedido. Motivo: ${data.error?.message || 'Erro desconhecido'}`);
                            return;
                        }

                        if (data.candidates && data.candidates.length > 0) {
                            this.disparoConfig.msg = data.candidates[0].content.parts[0].text.trim();
                        } else {
                            alert("A IA processou, mas não retornou nenhum texto. Tente mudar a descrição do produto.");
                        }

                    } catch (e) {
                        console.error("Erro interno no navegador:", e);
                        alert("Erro de conexão. Aperte F12 e veja a aba 'Console' para descobrir o que falhou.");
                    } finally {
                        this.aiLoadingDisparo = false;
                        setTimeout(() => lucide.createIcons(), 50);
                    }
                },

                toggleTheme() { this.isDarkMode = !this.isDarkMode; localStorage.setItem('theme', this.isDarkMode ? 'dark' : 'light'); setTimeout(() => lucide.createIcons(), 50); },
                playSound() { new Audio('https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3').play().catch(() => {}); },

                async loadLeads() {
                    const { data } = await this.client.from('leads').select('*').order('created_at', { ascending: false });
                    if (data) this.leads = data;
                    setTimeout(() => lucide.createIcons(), 50);
                },

                async openChat(lead) {
                    this.selectedLead = lead; this.selectedLeadStatus = lead.status; this.isChatOpen = true; this.messages = [];
                    const { data } = await this.client.from('messages').select('*').eq('lead_id', lead.id).order('timestamp', { ascending: true });
                    this.messages = data || []; this.scrollToBottom();
                    setTimeout(() => lucide.createIcons(), 50);
                },

                async sendMsg() {
                    if(!this.msgInput || !this.selectedLead) return;
                    const text = this.msgInput; this.msgInput = '';
                    this.messages.push({ id: Date.now(), content: text, from_me: true, timestamp: new Date().toISOString() });
                    this.scrollToBottom();
                    await fetch('https://projeto-evolution-api.xtknqq.easypanel.host/message/sendText/igor', {
                        method: 'POST', headers: { 'apikey': '773C15E29974-4BA2-B003-3F697EC279AE', 'Content-Type': 'application/json' }, body: JSON.stringify({ "number": this.selectedLead.numero, "text": text })
                    });
                    await this.client.from('messages').insert({ lead_id: this.selectedLead.id, content: text, from_me: true, type: 'text' });
                },

                async uploadAndSend(event, type) {
                    const file = event.target.files[0];
                    if (!file || !this.selectedLead) return;
                    const fileName = `${Date.now()}-${file.name.replace(/[^a-zA-Z0-9]/g, '')}.${file.name.split('.').pop()}`;
                    await this.client.storage.from('chat_media').upload(`${this.selectedLead.numero}/${fileName}`, file);
                    const { data } = this.client.storage.from('chat_media').getPublicUrl(`${this.selectedLead.numero}/${fileName}`);
                    let endpoint = 'sendMedia';
                    let body = { number: this.selectedLead.numero, media: data.publicUrl };
                    if (type === 'audio') { endpoint = 'sendWhatsAppAudio'; delete body.media; body.audio = data.publicUrl; }
                    else { body.mediatype = type === 'image' ? 'image' : type === 'video' ? 'video' : 'document'; body.fileName = file.name; }
                    await fetch(`https://projeto-evolution-api.xtknqq.easypanel.host/message/${endpoint}/igor`, { method: 'POST', headers: { 'apikey': '773C15E29974-4BA2-B003-3F697EC279AE', 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
                    await this.client.from('messages').insert({ lead_id: this.selectedLead.id, content: `[${type.toUpperCase()}] ${data.publicUrl}`, from_me: true, type: type });
                },

                processSpintax(text, lead) {
                    if(!text) return "";
                    let msg = text.replace(/{nome}/g, lead.nome ? lead.nome.split(' ')[0] : 'Cliente');
                    msg = msg.replace(/{([^{}]+)}/g, function(match, options) {
                        const words = options.split('|');
                        return words[Math.floor(Math.random() * words.length)];
                    });
                    return msg;
                },

                async iniciarDisparo() {
                    if (this.disparoConfig.isRunning) return;
                    
                    let alvos = this.leads;
                    if (this.disparoConfig.status !== 'todos') {
                        alvos = this.leads.filter(l => l.status === this.disparoConfig.status);
                    }

                    if (alvos.length === 0) return alert('Nenhum lead encontrado.');

                    this.disparoConfig.isRunning = true;
                    this.disparoConfig.total = alvos.length;
                    this.disparoConfig.sent = 0;

                    let publicMediaUrl = null;
                    let mediaType = null;
                    if (this.disparoConfig.file) {
                        const file = this.disparoConfig.file;
                        const fileName = `bulk-${Date.now()}-${file.name}`;
                        await this.client.storage.from('chat_media').upload(`disparos/${fileName}`, file);
                        const { data } = this.client.storage.from('chat_media').getPublicUrl(`disparos/${fileName}`);
                        publicMediaUrl = data.publicUrl;
                        mediaType = file.type.includes('image') ? 'image' : file.type.includes('video') ? 'video' : file.type.includes('audio') ? 'audio' : 'document';
                    }

                    for (const lead of alvos) {
                        if (!this.disparoConfig.isRunning) break;

                        try {
                            if (publicMediaUrl) {
                                let endpoint = 'sendMedia';
                                let body = { number: lead.numero, media: publicMediaUrl, mediatype: mediaType, fileName: this.disparoConfig.file.name };
                                if(mediaType === 'audio') { endpoint = 'sendWhatsAppAudio'; delete body.media; body.audio = publicMediaUrl; }
                                
                                await fetch(`https://projeto-evolution-api.xtknqq.easypanel.host/message/${endpoint}/igor`, {
                                    method: 'POST', 
                                    headers: { 'apikey': '773C15E29974-4BA2-B003-3F697EC279AE', 'Content-Type': 'application/json' }, 
                                    body: JSON.stringify(body)
                                });
                                await this.client.from('messages').insert({ lead_id: lead.id, content: `[${mediaType.toUpperCase()}] ${publicMediaUrl}`, from_me: true, type: mediaType });
                            }

                            if (this.disparoConfig.msg) {
                                const msgPronta = this.processSpintax(this.disparoConfig.msg, lead);
                                await fetch('https://projeto-evolution-api.xtknqq.easypanel.host/message/sendText/igor', {
                                    method: 'POST', 
                                    headers: { 'apikey': '773C15E29974-4BA2-B003-3F697EC279AE', 'Content-Type': 'application/json' }, 
                                    body: JSON.stringify({ number: lead.numero, text: msgPronta })
                                });
                                await this.client.from('messages').insert({ lead_id: lead.id, content: msgPronta, from_me: true, type: 'text' });
                            }

                        } catch (e) { console.error(e); }

                        this.disparoConfig.sent++;

                        if (this.disparoConfig.sent < this.disparoConfig.total && this.disparoConfig.isRunning) {
                            const delay = Math.floor(Math.random() * (this.disparoConfig.maxDelay - this.disparoConfig.minDelay + 1)) + parseInt(this.disparoConfig.minDelay);
                            await new Promise(r => setTimeout(r, delay * 1000));
                        }
                    }

                    this.disparoConfig.isRunning = false;
                },

                pararDisparo() { this.disparoConfig.isRunning = false; },

                async triggerBotRuleManual(rule) {
                    if(!this.selectedLead) return;
                    if(rule.media_url) {
                        let endpoint = 'sendMedia';
                        let body = { number: this.selectedLead.numero, media: rule.media_url, mediatype: rule.media_type || 'document' };
                        if(rule.media_type === 'audio') { endpoint = 'sendWhatsAppAudio'; delete body.media; body.audio = rule.media_url; }
                        await fetch(`https://projeto-evolution-api.xtknqq.easypanel.host/message/${endpoint}/igor`, { method: 'POST', headers: { 'apikey': '773C15E29974-4BA2-B003-3F697EC279AE', 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
                    }
                    if(rule.response_text) {
                        await fetch('https://projeto-evolution-api.xtknqq.easypanel.host/message/sendText/igor', { method: 'POST', headers: { 'apikey': '773C15E29974-4BA2-B003-3F697EC279AE', 'Content-Type': 'application/json' }, body: JSON.stringify({ number: this.selectedLead.numero, text: rule.response_text }) });
                    }
                },

                async saveBotRule() {
                    let mediaUrl = null; let mediaType = null;
                    if (this.botMediaFile) {
                        const fileName = `bot-${Date.now()}.${this.botMediaFile.name.split('.').pop()}`;
                        await this.client.storage.from('chat_media').upload(`bot_media/${fileName}`, this.botMediaFile);
                        const { data } = this.client.storage.from('chat_media').getPublicUrl(`bot_media/${fileName}`);
                        mediaUrl = data.publicUrl;
                        mediaType = this.botMediaFile.type.includes('image') ? 'image' : this.botMediaFile.type.includes('audio') ? 'audio' : 'document';
                    }
                    await this.client.from('chatbot_rules').insert({ trigger_text: this.newRule.trigger.toLowerCase(), response_text: this.newRule.response, media_url: mediaUrl, media_type: mediaType });
                    this.newRule = { trigger: '', response: '' }; this.botMediaFile = null; this.loadBotRules();
                },

                async loadBotRules() { const { data } = await this.client.from('chatbot_rules').select('*').order('created_at', { ascending: false }); if(data) { this.botRules = data; setTimeout(() => lucide.createIcons(), 50); } },
                async deleteBotRule(id) { await this.client.from('chatbot_rules').delete().eq('id', id); this.loadBotRules(); },

                setupRealtime() {
                    this.client.channel('leads_channel').on('postgres_changes', { event: '*', schema: 'public', table: 'leads' }, () => this.loadLeads()).subscribe();
                    this.client.channel('msgs_channel').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                        if (!payload.new.from_me) this.playSound();
                        if (this.isChatOpen && payload.new.lead_id === this.selectedLead?.id) {
                            if(!this.messages.find(m => m.id === payload.new.id)) { this.messages.push(payload.new); this.scrollToBottom(); }
                        }
                    }).subscribe();
                },

                async updateStatus(id, status) { await this.client.from('leads').update({ status }).eq('id', id); this.loadLeads(); },
                scrollToBottom() { setTimeout(() => { const b = document.getElementById('chat-box'); if(b) b.scrollTop = b.scrollHeight; }, 100); }
            }
        }
