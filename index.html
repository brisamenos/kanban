<!DOCTYPE html>
<html lang="pt-br" x-data="crmApp()" :class="{ 'dark': isDarkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EvoCRM Pro | Igor Borges Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: {
                    colors: {
                        panel: { light: '#FFFFFF', dark: '#0f172a' },
                        bg: { light: '#f8fafc', dark: '#020617' },
                        border: { light: '#e2e8f0', dark: '#1e293b' },
                    }
                } 
            }
        }
    </script>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://bernardo-castilho.github.io/DragDropTouch/DragDropTouch.js"></script>

    <style>
        [x-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .bg-pattern { background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%236366f1' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2v-4h4v-2h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2v-4h4v-2H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); }
        .glass { background: rgba(255, 255, 255, 0.8) !important; backdrop-filter: blur(12px) saturate(180%) !important; border-color: rgba(0,0,0,0.05) !important; }
        .dark .glass { background: rgba(15, 23, 42, 0.8) !important; backdrop-filter: blur(20px) saturate(180%) !important; border-color: rgba(255,255,255,0.03) !important; }
        .bg-chat-pattern { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; }
        .kanban-col { min-width: 85vw; height: calc(100vh - 240px); scroll-snap-align: center; }
        @media (min-width: 768px) { .kanban-col { min-width: 320px; } }
        .kanban-container { scroll-snap-type: x mandatory; }
        .premium-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .online-indicator { position: absolute; bottom: -2px; right: -2px; width: 14px; height: 14px; background: #10b981; border: 3px solid white; border-radius: 9999px; }
        .dark .online-indicator { border-color: #0f172a; }
    </style>
</head>
<body class="bg-bg-light text-slate-800 dark:bg-bg-dark dark:text-slate-200 antialiased font-sans overflow-hidden bg-pattern transition-colors duration-300">

    <div class="flex h-screen w-full relative">
        
        <aside class="w-64 glass border-r hidden md:flex flex-col z-20">
            <div class="p-8 flex items-center gap-4 border-b border-gray-100 dark:border-slate-800/50">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/40">
                    <i data-lucide="zap" class="text-white w-6 h-6"></i>
                </div>
                <h1 class="font-black text-2xl tracking-tighter text-slate-950 dark:text-white">EVO<span class="text-indigo-500">PRO</span></h1>
            </div>
            
            <nav class="flex-1 px-4 space-y-2 mt-6">
                <template x-for="item in navItems">
                    <button @click="screen = item.id" 
                        :class="screen === item.id ? 'bg-indigo-600 text-white shadow-xl shadow-indigo-500/20' : 'text-slate-500 dark:text-slate-400 hover:bg-gray-100 dark:hover:bg-slate-800'" 
                        class="w-full flex items-center gap-3 px-5 py-3.5 rounded-2xl text-sm font-bold transition-all group">
                        <i :data-lucide="item.icon" class="w-5 h-5 transition-transform group-hover:scale-110"></i> 
                        <span x-text="item.label"></span>
                    </button>
                </template>
            </nav>
            
            <div class="p-6 border-t border-gray-100 dark:border-slate-800/50 flex justify-between items-center bg-gray-50/50 dark:bg-slate-900/30 rounded-t-3xl">
                <div class="flex items-center gap-3">
                    <img src="https://api.dicebear.com/8.x/notionists/svg?seed=Igor" class="w-9 h-9 rounded-full bg-indigo-100 border-2 border-white dark:border-slate-700">
                    <div class="truncate">
                        <p class="text-xs font-bold dark:text-white">Igor Borges</p>
                        <p class="text-[9px] text-emerald-500 font-black uppercase tracking-widest">Admin Online</p>
                    </div>
                </div>
                <button @click="toggleTheme()" class="p-2 text-slate-400 hover:text-indigo-500 dark:hover:text-indigo-400">
                    <i :data-lucide="isDarkMode ? 'sun' : 'moon'" class="w-5 h-5"></i>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative w-full h-full pb-20 md:pb-0">
            <header class="h-20 px-6 md:px-10 flex items-center justify-between glass border-b sticky top-0 z-10">
                <h2 class="font-black text-xl tracking-tight text-slate-950 dark:text-white" x-text="navItems.find(i => i.id === screen)?.label || 'CRM'"></h2>
                <button @click="toggleTheme()" class="md:hidden p-3 bg-gray-100 dark:bg-slate-800 rounded-xl text-slate-500 dark:text-white">
                    <i :data-lucide="isDarkMode ? 'sun' : 'moon'" class="w-5 h-5"></i>
                </button>
            </header>

            <section class="flex-1 overflow-y-auto p-5 md:p-8 no-scrollbar">
                
                <div x-show="screen === 'dash'" x-cloak class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div class="bg-white dark:bg-slate-900 p-8 rounded-[2.5rem] shadow-xl border border-gray-100 dark:border-slate-800">
                        <p class="text-slate-500 text-xs font-black uppercase tracking-widest mb-2">Total de Leads</p>
                        <h3 class="text-5xl font-black text-slate-950 dark:text-white" x-text="leads.length">0</h3>
                    </div>
                    <div class="bg-white dark:bg-slate-900 p-8 rounded-[2.5rem] shadow-xl border border-gray-100 dark:border-slate-800 border-b-4 border-b-emerald-500">
                        <p class="text-slate-500 text-xs font-black uppercase tracking-widest mb-2">Vendas Fechadas</p>
                        <h3 class="text-5xl font-black text-slate-950 dark:text-white" x-text="leads.filter(l => l.status === 'fechado').length">0</h3>
                    </div>
                </div>

                <div x-show="screen === 'kanban'" x-cloak class="flex gap-6 overflow-x-auto pb-6 no-scrollbar kanban-container h-full">
                    <template x-for="col in columns" :key="col.id">
                        <div class="kanban-col flex flex-col gap-4 bg-slate-200/30 dark:bg-slate-900/40 p-3 rounded-[2.5rem] border border-gray-200/50 dark:border-slate-800/50" @dragover.prevent @drop="updateStatus($event.dataTransfer.getData('id'), col.id)">
                            <div class="flex items-center justify-between px-3">
                                <span class="text-[11px] font-black uppercase tracking-widest text-slate-500 dark:text-slate-400" x-text="col.name"></span>
                                <span class="text-[10px] bg-white dark:bg-slate-800 text-slate-900 dark:text-white px-3 py-1.5 rounded-full font-bold shadow-sm" x-text="leads.filter(l => l.status === col.id).length"></span>
                            </div>
                            <div class="flex-1 overflow-y-auto flex flex-col gap-4 no-scrollbar pb-3">
                                <template x-for="lead in leads.filter(l => l.status === col.id)" :key="lead.id">
                                    <div draggable="true" @dragstart="$event.dataTransfer.setData('id', lead.id)" @click="openChat(lead)" 
                                         class="bg-white dark:bg-slate-800 p-4 rounded-3xl premium-card shadow-lg border border-gray-100 dark:border-slate-700/50 cursor-pointer hover:-translate-y-1 transition-all duration-300">
                                        <div class="flex items-center gap-4">
                                            <div class="relative flex-shrink-0">
                                                <img :src="lead.foto_url || 'https://api.dicebear.com/8.x/notionists/svg?seed=' + lead.nome" class="w-14 h-14 rounded-2xl object-cover bg-slate-100 dark:bg-slate-700 border-2 border-white dark:border-slate-600 shadow-sm" @error="$el.src = 'https://api.dicebear.com/8.x/notionists/svg?seed=' + lead.nome">
                                                <div class="online-indicator"></div>
                                            </div>
                                            <div class="flex-1 overflow-hidden">
                                                <h4 class="font-extrabold text-[15px] text-slate-950 dark:text-white truncate tracking-tight" x-text="lead.nome"></h4>
                                                <p class="text-[11px] text-slate-500 dark:text-slate-400 font-medium" x-text="lead.numero"></p>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>

                <div x-show="screen === 'bot'" x-cloak class="max-w-4xl mx-auto space-y-6">
                    <div class="bg-white dark:bg-slate-900 p-8 md:p-10 rounded-[3rem] shadow-xl border border-gray-100 dark:border-slate-800">
                        <h3 class="font-black text-2xl mb-8 dark:text-white tracking-tighter flex items-center gap-2"><i data-lucide="bot" class="text-indigo-500"></i> Automação do Robô</h3>
                        <div class="space-y-4">
                            <input x-model="newRule.trigger" type="text" placeholder="Gatilho ex: tabela, audio..." class="w-full bg-slate-50 dark:bg-slate-950 border border-gray-200 dark:border-slate-800 rounded-2xl p-5 outline-none dark:text-white">
                            <textarea x-model="newRule.response" placeholder="Mensagem automática..." rows="3" class="w-full bg-slate-50 dark:bg-slate-950 border border-gray-200 dark:border-slate-800 rounded-2xl p-5 outline-none dark:text-white"></textarea>
                            <div class="flex flex-col sm:flex-row sm:items-center gap-4 bg-gray-50 dark:bg-slate-800/30 p-5 rounded-2xl border border-dashed border-gray-300 dark:border-slate-700">
                                <input type="file" x-ref="botMediaInput" class="hidden" @change="botMediaFile = $event.target.files[0]">
                                <button @click="$refs.botMediaInput.click()" class="bg-white dark:bg-slate-800 px-6 py-3 rounded-xl text-xs font-bold border border-gray-200 dark:border-slate-700 hover:bg-indigo-600 hover:text-white transition-all">
                                    <i data-lucide="paperclip" class="w-4 h-4 inline mr-1"></i> Anexar Mídia
                                </button>
                                <span x-show="botMediaFile" class="text-xs text-indigo-500 font-bold" x-text="botMediaFile?.name"></span>
                            </div>
                            <button @click="saveBotRule()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-5 rounded-2xl shadow-lg shadow-indigo-500/30 active:scale-95">Salvar Regra</button>
                        </div>
                    </div>
                </div>

            </section>
        </main>

        <div x-show="isChatOpen" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0" x-transition:leave="transition ease-in duration-200" x-transition:leave-start="translate-x-0" x-transition:leave-end="translate-x-full" x-cloak 
             class="fixed inset-0 md:left-auto md:right-0 w-full md:w-[500px] bg-white dark:bg-slate-950 z-[100] flex flex-col shadow-2xl">
            
            <header class="h-24 px-6 border-b border-gray-100 dark:border-slate-800 flex items-center bg-white dark:bg-slate-900 z-10 shrink-0 justify-between">
                <div class="flex items-center overflow-hidden">
                    <button @click="isChatOpen = false" class="p-3 -ml-2 mr-2 text-slate-400 hover:text-slate-900 dark:hover:text-white rounded-xl"><i data-lucide="arrow-left" class="w-7 h-7"></i></button>
                    <div class="relative mr-4">
                        <img :src="selectedLead?.foto_url || 'https://api.dicebear.com/8.x/notionists/svg?seed=' + selectedLead?.nome" class="w-12 h-12 rounded-2xl border-2 border-white dark:border-slate-700 shadow-sm">
                        <div class="online-indicator"></div>
                    </div>
                    <div class="truncate">
                        <h3 class="font-black text-lg text-slate-950 dark:text-white truncate tracking-tight" x-text="selectedLead?.nome"></h3>
                        <p class="text-xs text-emerald-500 font-bold" x-text="selectedLead?.numero"></p>
                    </div>
                </div>
                <select x-model="selectedLeadStatus" @change="updateStatus(selectedLead.id, $event.target.value)" class="bg-slate-100 dark:bg-slate-800 text-[10px] font-black uppercase text-slate-700 dark:text-white px-4 py-3 rounded-2xl outline-none">
                    <template x-for="col in columns" :key="col.id">
                        <option :value="col.id" x-text="col.name"></option>
                    </template>
                </select>
            </header>

            <div class="absolute inset-0 top-24 bottom-[150px] bg-[#efeae2] dark:bg-[#0b141a] bg-chat-pattern opacity-40 dark:opacity-20 -z-0"></div>
            
            <div class="flex-1 overflow-y-auto p-6 space-y-4 z-10 scroll-smooth no-scrollbar" id="chat-box">
                <template x-for="msg in messages" :key="msg.id">
                    <div :class="msg.from_me ? 'justify-end' : 'justify-start'" class="flex w-full">
                        <div :class="msg.from_me ? 'bg-indigo-600 text-white rounded-l-3xl rounded-tr-3xl shadow-lg' : 'bg-white dark:bg-slate-800 text-slate-950 dark:text-slate-200 rounded-r-3xl rounded-tl-3xl shadow-md'" class="p-5 max-w-[85%] relative">
                            <template x-if="msg.content && msg.content.includes('http') && (msg.content.includes('chat_media') || msg.content.includes('[Áudio]'))">
                                <a :href="msg.content.split(' ').pop()" target="_blank" class="underline break-all text-sm font-bold" :class="msg.from_me ? 'text-indigo-100' : 'text-indigo-600 dark:text-indigo-400'"><i data-lucide="external-link" class="w-3.5 h-3.5 inline mr-1"></i> Ver Arquivo</a>
                            </template>
                            <template x-if="msg.content && !msg.content.includes('chat_media')"><p class="text-[15px] leading-relaxed break-words font-medium" x-text="msg.content"></p></template>
                            <div class="flex items-center justify-end gap-1.5 mt-2 opacity-50"><span class="text-[10px] font-black" x-text="new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})"></span></div>
                        </div>
                    </div>
                </template>
            </div>

            <footer class="bg-white dark:bg-slate-900 border-t border-gray-100 dark:border-slate-800 p-4 z-10 pb-safe shrink-0">
                <div class="flex gap-2 overflow-x-auto pb-3 no-scrollbar mb-2">
                    <button @click="msgInput = 'Olá! Tudo bem? Como posso te ajudar hoje?'" class="shrink-0 bg-slate-100 dark:bg-slate-800 text-[10px] font-black px-4 py-2 rounded-full dark:text-white">👋 Saudação</button>
                    <button @click="msgInput = 'O tráfego pago pode aumentar muito as suas vendas!'" class="shrink-0 bg-slate-100 dark:bg-slate-800 text-[10px] font-black px-4 py-2 rounded-full dark:text-white">📈 Tráfego</button>
                    <button @click="msgInput = 'A energia solar é o melhor investimento hoje.'" class="shrink-0 bg-slate-100 dark:bg-slate-800 text-[10px] font-black px-4 py-2 rounded-full dark:text-white">☀️ Solar</button>
                    <template x-for="rule in botRules" :key="rule.id">
                        <button @click="triggerBotRuleManual(rule)" class="shrink-0 bg-indigo-50 dark:bg-indigo-900/40 text-[10px] font-black px-4 py-2 rounded-full text-indigo-600 dark:text-indigo-300 border border-indigo-100 dark:border-indigo-800">🤖 <span x-text="rule.trigger_text"></span></button>
                    </template>
                </div>

                <div class="flex items-center gap-2">
                    <div class="flex">
                        <input type="file" x-ref="imgI" class="hidden" @change="uploadAndSend($event, 'image')">
                        <input type="file" x-ref="audI" class="hidden" @change="uploadAndSend($event, 'audio')">
                        <input type="file" x-ref="docI" class="hidden" @change="uploadAndSend($event, 'document')">
                        <button @click="$refs.imgI.click()" class="p-2 text-slate-400 hover:text-indigo-500"><i data-lucide="image" class="w-6 h-6"></i></button>
                        <button @click="$refs.audI.click()" class="p-2 text-slate-400 hover:text-indigo-500"><i data-lucide="mic" class="w-6 h-6"></i></button>
                        <button @click="$refs.docI.click()" class="p-2 text-slate-400 hover:text-indigo-500"><i data-lucide="file-text" class="w-6 h-6"></i></button>
                    </div>
                    <div class="flex-1 bg-slate-50 dark:bg-slate-950 rounded-2xl flex items-center px-4 border dark:border-slate-800">
                        <input x-model="msgInput" @keydown.enter="sendMsg()" type="text" placeholder="Mensagem..." class="w-full bg-transparent py-4 text-[15px] dark:text-white outline-none">
                    </div>
                    <button @click="sendMsg()" class="w-14 h-14 rounded-2xl bg-indigo-600 flex items-center justify-center text-white shrink-0 shadow-lg active:scale-90 transition-all"><i data-lucide="send" class="w-6 h-6 ml-1"></i></button>
                </div>
            </footer>
        </div>

        <nav class="md:hidden fixed bottom-0 w-full glass pb-safe pt-2 px-6 flex justify-between items-center z-40 h-24 rounded-t-[3rem] border-t">
            <template x-for="item in navItems">
                <button @click="screen = item.id" :class="screen === item.id ? 'text-indigo-600 dark:text-indigo-400 scale-110' : 'text-slate-400'" class="flex flex-col items-center gap-2 p-2 transition-all">
                    <i :data-lucide="item.icon" class="w-7 h-7"></i>
                    <span class="text-[11px]" x-text="item.label"></span>
                </button>
            </template>
        </nav>
    </div>

    <script>
        function crmApp() {
            return {
                screen: 'kanban', isChatOpen: false, selectedLead: null, selectedLeadStatus: '', msgInput: '', leads: [], messages: [], 
                botRules: [], newRule: { trigger: '', response: '' }, botMediaFile: null,
                isDarkMode: localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches),
                navItems: [{ id: 'dash', label: 'Dash', icon: 'pie-chart' }, { id: 'kanban', label: 'Funil', icon: 'columns' }, { id: 'bot', label: 'Robô', icon: 'bot' }],
                columns: [{ id: 'novo_lead', name: 'Triagem / IA' }, { id: 'atendimento', name: 'Negociação' }, { id: 'proposta', name: 'Proposta' }, { id: 'fechado', name: 'Venda' }],
                
                async init() {
                    const SB_URL = 'https://qhnbisjogpdoyszpsucs.supabase.co';
                    const SB_KEY = 'sb_publishable_3PAly_BCdvoldAzm1Y7SxQ_S3rp2QhQ';
                    this.client = supabase.createClient(SB_URL, SB_KEY);
                    await this.loadLeads();
                    await this.loadBotRules();
                    this.setupRealtime();
                    setTimeout(() => lucide.createIcons(), 100);
                },

                toggleTheme() { this.isDarkMode = !this.isDarkMode; localStorage.setItem('theme', this.isDarkMode ? 'dark' : 'light'); setTimeout(() => lucide.createIcons(), 50); },
                playSound() { new Audio('https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3').play().catch(() => {}); },

                async loadLeads() {
                    const { data } = await this.client.from('leads').select('*').order('created_at', { ascending: false });
                    if (data) this.leads = data;
                    setTimeout(() => lucide.createIcons(), 50);
                },

                async openChat(lead) {
                    this.selectedLead = lead; this.selectedLeadStatus = lead.status; this.isChatOpen = true; this.messages = [];
                    const { data } = await this.client.from('messages').select('*').eq('lead_id', lead.id).order('timestamp', { ascending: true });
                    this.messages = data || []; this.scrollToBottom();
                    setTimeout(() => lucide.createIcons(), 50);
                },

                async sendMsg() {
                    if(!this.msgInput || !this.selectedLead) return;
                    const text = this.msgInput; this.msgInput = '';
                    this.messages.push({ id: Date.now(), content: text, from_me: true, timestamp: new Date().toISOString() });
                    this.scrollToBottom();
                    await fetch('https://projeto-evolution-api.xtknqq.easypanel.host/message/sendText/igor', {
                        method: 'POST', headers: { 'apikey': '773C15E29974-4BA2-B003-3F697EC279AE', 'Content-Type': 'application/json' }, body: JSON.stringify({ "number": this.selectedLead.numero, "text": text })
                    });
                    await this.client.from('messages').insert({ lead_id: this.selectedLead.id, content: text, from_me: true, type: 'text' });
                },

                async uploadAndSend(event, type) {
                    const file = event.target.files[0];
                    if (!file || !this.selectedLead) return;
                    const fileName = `${Date.now()}-${file.name.replace(/[^a-zA-Z0-9]/g, '')}.${file.name.split('.').pop()}`;
                    await this.client.storage.from('chat_media').upload(`${this.selectedLead.numero}/${fileName}`, file);
                    const { data } = this.client.storage.from('chat_media').getPublicUrl(`${this.selectedLead.numero}/${fileName}`);
                    let endpoint = 'sendMedia';
                    let body = { number: this.selectedLead.numero, media: data.publicUrl };
                    if (type === 'audio') { endpoint = 'sendWhatsAppAudio'; delete body.media; body.audio = data.publicUrl; }
                    else { body.mediatype = type === 'image' ? 'image' : 'document'; body.fileName = file.name; }
                    await fetch(`https://projeto-evolution-api.xtknqq.easypanel.host/message/${endpoint}/igor`, {
                        method: 'POST', headers: { 'apikey': '773C15E29974-4BA2-B003-3F697EC279AE', 'Content-Type': 'application/json' }, body: JSON.stringify(body)
                    });
                    await this.client.from('messages').insert({ lead_id: this.selectedLead.id, content: `[${type.toUpperCase()}] ${data.publicUrl}`, from_me: true, type: type });
                },

                // NOVO: Gatilho manual direto pelo chat
                async triggerBotRuleManual(rule) {
                    if(!this.selectedLead) return;
                    if(rule.media_url) {
                        let endpoint = 'sendMedia';
                        let body = { number: this.selectedLead.numero, media: rule.media_url, mediatype: rule.media_type || 'document' };
                        if(rule.media_type === 'audio') { endpoint = 'sendWhatsAppAudio'; delete body.media; body.audio = rule.media_url; }
                        await fetch(`https://projeto-evolution-api.xtknqq.easypanel.host/message/${endpoint}/igor`, { method: 'POST', headers: { 'apikey': '773C15E29974-4BA2-B003-3F697EC279AE', 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
                    }
                    if(rule.response_text) {
                        await fetch('https://projeto-evolution-api.xtknqq.easypanel.host/message/sendText/igor', { method: 'POST', headers: { 'apikey': '773C15E29974-4BA2-B003-3F697EC279AE', 'Content-Type': 'application/json' }, body: JSON.stringify({ number: this.selectedLead.numero, text: rule.response_text }) });
                    }
                    alert('Disparo do robô realizado!');
                },

                async saveBotRule() {
                    let mediaUrl = null; let mediaType = null;
                    if (this.botMediaFile) {
                        const fileName = `bot-${Date.now()}.${this.botMediaFile.name.split('.').pop()}`;
                        await this.client.storage.from('chat_media').upload(`bot_media/${fileName}`, this.botMediaFile);
                        const { data } = this.client.storage.from('chat_media').getPublicUrl(`bot_media/${fileName}`);
                        mediaUrl = data.publicUrl;
                        mediaType = this.botMediaFile.type.includes('image') ? 'image' : this.botMediaFile.type.includes('audio') ? 'audio' : 'document';
                    }
                    await this.client.from('chatbot_rules').insert({ trigger_text: this.newRule.trigger.toLowerCase(), response_text: this.newRule.response, media_url: mediaUrl, media_type: mediaType });
                    this.newRule = { trigger: '', response: '' }; this.botMediaFile = null; this.loadBotRules();
                },

                async loadBotRules() { const { data } = await this.client.from('chatbot_rules').select('*'); if(data) this.botRules = data; },
                async deleteBotRule(id) { await this.client.from('chatbot_rules').delete().eq('id', id); this.loadBotRules(); },

                setupRealtime() {
                    this.client.channel('leads_channel').on('postgres_changes', { event: '*', schema: 'public', table: 'leads' }, () => this.loadLeads()).subscribe();
                    this.client.channel('msgs_channel').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                        if (!payload.new.from_me) this.playSound();
                        if (this.isChatOpen && payload.new.lead_id === this.selectedLead?.id) {
                            if(!this.messages.find(m => m.id === payload.new.id)) { this.messages.push(payload.new); this.scrollToBottom(); }
                        }
                    }).subscribe();
                },

                async updateStatus(id, status) { await this.client.from('leads').update({ status }).eq('id', id); this.loadLeads(); },
                scrollToBottom() { setTimeout(() => { const b = document.getElementById('chat-box'); if(b) b.scrollTop = b.scrollHeight; }, 100); }
            }
        }
    </script>
</body>
</html>
