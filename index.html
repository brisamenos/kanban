<!DOCTYPE html>
<html lang="pt-br" x-data="crmApp()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EvoCRM - Igor Borges</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        [x-cloak] { display: none !important; }
        .bg-chat { background-color: #0b141a; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; }
        .kanban-col { min-width: 280px; height: calc(100vh - 200px); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 antialiased overflow-hidden">

    <header class="p-4 border-b border-slate-800 bg-slate-900 flex justify-between items-center shadow-2xl">
        <div>
            <h1 class="text-xl font-black text-blue-500 uppercase tracking-tighter" x-text="screen">DASHBOARD</h1>
            <p class="text-[10px] text-emerald-500 font-bold flex items-center gap-1">
                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> SISTEMA ATIVO
            </p>
        </div>
        <div class="w-10 h-10 bg-slate-800 rounded-xl border border-slate-700 flex items-center justify-center font-bold text-blue-400">IB</div>
    </header>

    <main class="h-screen overflow-y-auto pb-32 p-4">
        
        <div x-show="screen === 'dash'" x-cloak class="grid grid-cols-2 gap-4">
            <div class="bg-slate-900 p-5 rounded-3xl border border-slate-800 shadow-lg">
                <p class="text-slate-500 text-[10px] font-bold uppercase mb-2">Total Leads</p>
                <h3 class="text-3xl font-black" x-text="leads.length">0</h3>
            </div>
            <div class="bg-slate-900 p-5 rounded-3xl border border-slate-800 shadow-lg border-l-4 border-l-blue-500">
                <p class="text-slate-500 text-[10px] font-bold uppercase mb-2">Novos Hoje</p>
                <h3 class="text-3xl font-black" x-text="leads.filter(l => l.status === 'novo_lead').length">0</h3>
            </div>
        </div>

        <div x-show="screen === 'kanban'" x-cloak class="flex gap-4 overflow-x-auto pb-10 no-scrollbar">
            <template x-for="col in columns" :key="col.id">
                <div class="kanban-col bg-slate-900/50 p-3 rounded-3xl border border-slate-800 flex flex-col gap-3">
                    <span class="text-[11px] font-black text-slate-500 uppercase px-2" x-text="col.name"></span>
                    
                    <div class="flex-1 overflow-y-auto flex flex-col gap-3">
                        <template x-for="lead in leads.filter(l => l.status === col.id)" :key="lead.id">
                            <div @click="openChat(lead)" class="bg-slate-800 p-4 rounded-2xl border border-slate-700 active:scale-95 transition-all shadow-md">
                                <p class="font-bold text-sm" x-text="lead.nome"></p>
                                <p class="text-[11px] text-slate-400 mb-3" x-text="lead.numero"></p>
                                <div class="flex justify-between items-center">
                                    <span class="text-[9px] bg-blue-500/20 text-blue-400 px-2 py-1 rounded-md font-bold uppercase">WhatsApp</span>
                                    <i data-lucide="chevron-right" class="w-4 h-4 text-slate-600"></i>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <div x-show="isChatOpen" x-cloak class="fixed inset-0 bg-slate-950 z-[100] flex flex-col">
        <header class="p-4 bg-slate-900 border-b border-slate-800 flex items-center gap-3">
            <button @click="isChatOpen = false"><i data-lucide="arrow-left"></i></button>
            <div class="flex-1">
                <p class="font-bold" x-text="selectedLead?.nome"></p>
                <p class="text-[10px] text-emerald-500">Conectado via Evolution API</p>
            </div>
        </header>
        <div class="flex-1 bg-chat overflow-y-auto p-4 space-y-3" id="chat-box">
             <p class="text-center text-[10px] text-slate-500 bg-slate-900/50 py-1 rounded-full">Início da conversa com <span x-text="selectedLead?.numero"></span></p>
        </div>
        <footer class="p-4 bg-slate-900 flex gap-2">
            <input x-model="msgInput" type="text" placeholder="Digite..." class="flex-1 bg-slate-800 border-none rounded-full px-4 py-3 text-sm">
            <button @click="sendMsg()" class="bg-blue-600 p-3 rounded-full"><i data-lucide="send"></i></button>
        </footer>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-slate-900/90 backdrop-blur-lg border-t border-slate-800 p-4 flex justify-around items-center z-50">
        <button @click="screen = 'dash'" :class="screen === 'dash' ? 'text-blue-500' : 'text-slate-500'" class="flex flex-col items-center">
            <i data-lucide="layout-dashboard"></i>
            <span class="text-[10px] mt-1 font-bold uppercase">Home</span>
        </button>
        <button @click="screen = 'kanban'" :class="screen === 'kanban' ? 'text-blue-500' : 'text-slate-500'" class="flex flex-col items-center">
            <i data-lucide="trello"></i>
            <span class="text-[10px] mt-1 font-bold uppercase">Kanban</span>
        </button>
        <div class="bg-blue-600 p-4 rounded-full -mt-12 border-8 border-slate-950 shadow-2xl text-white">
            <i data-lucide="zap"></i>
        </div>
        <button class="text-slate-500 flex flex-col items-center opacity-30">
            <i data-lucide="git-merge"></i>
            <span class="text-[10px] mt-1 font-bold uppercase">Funis</span>
        </button>
        <button class="text-slate-500 flex flex-col items-center opacity-30">
            <i data-lucide="settings"></i>
            <span class="text-[10px] mt-1 font-bold uppercase">Ajustes</span>
        </button>
    </nav>

    <script>
        function crmApp() {
            return {
                screen: 'dash',
                isChatOpen: false,
                selectedLead: null,
                msgInput: '',
                leads: [],
                columns: [
                    { id: 'novo_lead', name: 'Novo Lead' },
                    { id: 'atendimento', name: 'Em Atendimento' },
                    { id: 'proposta', name: 'Proposta Enviada' },
                    { id: 'fechado', name: 'Fechado' }
                ],
                
                async init() {
                    lucide.createIcons();
                    
                    // Configurações do Igor
                    const SB_URL = 'https://qhnbisjogpdoyszpsucs.supabase.co';
                    const SB_KEY = 'sb_publishable_3PAly_BCdvoldAzm1Y7SxQ_S3rp2QhQ';
                    
                    this.client = supabase.createClient(SB_URL, SB_KEY);
                    
                    // Carregar Dados
                    await this.loadLeads();
                    
                    // Realtime
                    this.client.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'leads' }, () => {
                        this.loadLeads();
                    }).subscribe();
                },

                async loadLeads() {
                    const { data } = await this.client.from('leads').select('*').order('created_at', { ascending: false });
                    if (data) this.leads = data;
                },

                openChat(lead) {
                    this.selectedLead = lead;
                    this.isChatOpen = true;
                    setTimeout(() => lucide.createIcons(), 10);
                },

                async sendMsg() {
                    if(!this.msgInput) return;
                    
                    // Envio para sua Evolution API no Easypanel
                    const response = await fetch('https://projeto-evolution-api.xtknqq.easypanel.host/message/sendText/NOME_DA_SUA_INSTANCIA', {
                        method: 'POST',
                        headers: {
                            'apikey': '773C15E29974-4BA2-B003-3F697EC279AE',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            "number": this.selectedLead.numero,
                            "text": this.msgInput
                        })
                    });

                    if(response.ok) {
                        this.msgInput = '';
                        alert("Enviado com sucesso!");
                    }
                }
            }
        }
    </script>
</body>
</html>
