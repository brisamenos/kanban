<!DOCTYPE html>
<html lang="pt-br" x-data="crmApp()" :class="{ 'dark': isDarkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EvoCRM Pro | Igor Borges Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: {
                    colors: {
                        // Paleta Profissional Premium
                        panel: { light: '#FFFFFF', dark: '#0f172a' }, // slate-900
                        bg: { light: '#f1f5f9', dark: '#020617' }, // slate-100 / slate-950
                        border: { light: '#e2e8f0', dark: '#1e293b' }, // slate-200 / slate-800
                    },
                    boxShadow: {
                        'premium': '0 10px 15px -3px rgba(0, 0, 0, 0.02), 0 4px 6px -2px rgba(0, 0, 0, 0.01)',
                        'premium-hover': '0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02)',
                        'dark-premium': '0 10px 15px -3px rgba(0, 0, 0, 0.2), 0 4px 6px -2px rgba(0, 0, 0, 0.1)',
                        'dark-premium-hover': '0 25px 50px -12px rgba(0, 0, 0, 0.3)'
                    }
                } 
            }
        }
    </script>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://bernardo-castilho.github.io/DragDropTouch/DragDropTouch.js"></script>

    <style>
        [x-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Background pattern sutil para tirar o 'vazio' */
        .bg-pattern { 
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%236366f1' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2v-4h4v-2h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2v-4h4v-2H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        .dark .bg-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23818cf8' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2v-4h4v-2h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2v-4h4v-2H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        /* EFEITO Vidro Jateado (Glassmorphism) */
        .glass { 
            background: rgba(255, 255, 255, 0.7) !important; 
            backdrop-filter: blur(12px) saturate(180%) !important; 
            -webkit-backdrop-filter: blur(12px) saturate(180%) !important;
            border-color: rgba(0,0,0,0.05) !important;
        }
        .dark .glass { 
            background: rgba(15, 23, 42, 0.8) !important; 
            backdrop-filter: blur(20px) saturate(180%) !important; 
            -webkit-backdrop-filter: blur(20px) saturate(180%) !important;
            border-color: rgba(255,255,255,0.03) !important;
        }
        
        .bg-chat-pattern { 
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); 
            background-blend-mode: overlay; 
        }
        
        .kanban-col { min-width: 85vw; height: calc(100vh - 240px); scroll-snap-align: center; }
        @media (min-width: 768px) { .kanban-col { min-width: 320px; } }
        .kanban-container { scroll-snap-type: x mandatory; }
        
        body { touch-action: pan-y; transition: background-color 0.3s, color 0.3s; } 
        
        /* Animação suave para os cards */
        .premium-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-bg-light text-slate-800 dark:bg-bg-dark dark:text-slate-200 antialiased font-sans overflow-hidden bg-pattern transition-colors duration-200">

    <div class="flex h-screen w-full relative">
        
        <aside class="w-68 glass border-r hidden md:flex flex-col z-20 transition-all duration-300">
            <div class="p-7 flex items-center gap-3.5 border-b border-gray-100 dark:border-slate-800/50">
                <div class="w-11 h-11 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-500/30">
                    <i data-lucide="zap" class="text-white w-6 h-6"></i>
                </div>
                <h1 class="font-black text-2xl tracking-tighter text-slate-950 dark:text-white">EVO<span class="text-indigo-500">PRO</span></h1>
            </div>
            
            <nav class="flex-1 px-4 space-y-2.5 mt-6">
                <template x-for="item in navItems">
                    <button @click="screen = item.id" 
                        :class="screen === item.id ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-500/20' : 'text-slate-600 dark:text-slate-400 hover:bg-gray-100 dark:hover:bg-slate-800 hover:text-slate-950 dark:hover:text-white'" 
                        class="w-full flex items-center gap-3.5 px-5 py-3.5 rounded-2xl text-sm font-bold transition-all duration-200 group">
                        <i :data-lucide="item.icon" class="w-5 h-5 shrink-0 transition-transform group-hover:scale-110"></i> 
                        <span x-text="item.label" class="flex-1 text-left"></span>
                        <i data-lucide="chevron-right" x-show="screen === item.id" class="w-4 h-4 opacity-70"></i>
                    </button>
                </template>
            </nav>
            
            <div class="p-6 border-t border-gray-100 dark:border-slate-800/50 flex justify-between items-center bg-gray-50/50 dark:bg-slate-900/30 rounded-t-3xl">
                <div class="flex items-center gap-3 overflow-hidden">
                    <img src="https://api.dicebear.com/8.x/notionists/svg?seed=Igor" class="w-10 h-10 rounded-full bg-indigo-100 border-2 border-white dark:border-slate-700 shadow-sm">
                    <div class="flex-1 overflow-hidden">
                        <p class="text-sm font-bold truncate text-slate-950 dark:text-white">Igor Borges</p>
                        <p class="text-[10px] text-emerald-600 dark:text-emerald-500 font-black uppercase tracking-widest flex items-center gap-1"><span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span> Online</p>
                    </div>
                </div>
                <button @click="toggleTheme()" class="p-2.5 text-slate-500 hover:text-indigo-600 dark:text-slate-400 dark:hover:text-indigo-400 rounded-xl bg-white dark:bg-slate-800 shadow-premium dark:shadow-dark-premium hover:shadow-premium-hover dark:hover:shadow-dark-premium-hover transition-all">
                    <i :data-lucide="isDarkMode ? 'sun' : 'moon'" class="w-4 h-4"></i>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative w-full h-full pb-20 md:pb-0">
            <header class="h-20 px-4 md:px-10 flex items-center justify-between glass border-b sticky top-0 z-10 transition-colors duration-200">
                <div class="flex items-center gap-3">
                    <button class="md:hidden p-2.5 bg-gray-100 dark:bg-slate-800 rounded-xl mr-1 text-slate-600 dark:text-slate-300">
                        <i data-lucide="menu" class="w-5 h-5"></i>
                    </button>
                    <h2 class="font-extrabold text-xl tracking-tight text-slate-950 dark:text-white" x-text="navItems.find(i => i.id === screen)?.label || 'CRM'"></h2>
                </div>
                <div class="flex items-center gap-3">
                    <div class="hidden sm:flex items-center gap-2 bg-gray-100 dark:bg-slate-800 p-1.5 rounded-full border border-gray-200 dark:border-slate-700/50">
                        <i data-lucide="search" class="w-4 h-4 text-slate-400 ml-2"></i>
                        <input type="text" placeholder="Buscar lead..." class="bg-transparent text-sm outline-none w-48 dark:text-white">
                    </div>
                    <button @click="toggleTheme()" class="md:hidden p-3 text-slate-500 hover:text-indigo-600 dark:text-slate-400 dark:hover:text-white bg-gray-100 dark:bg-slate-800 rounded-xl transition-colors">
                        <i :data-lucide="isDarkMode ? 'sun' : 'moon'" class="w-4 h-4"></i>
                    </button>
                </div>
            </header>

            <section class="flex-1 overflow-y-auto p-5 md:p-10 no-scrollbar space-y-10">
                
                <div x-show="screen === 'dash'" x-cloak class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-6">
                    <div class="bg-panel-light dark:bg-panel-dark border border-border-light dark:border-border-dark p-7 rounded-3xl shadow-premium dark:shadow-dark-premium premium-card hover:shadow-premium-hover dark:hover:shadow-dark-premium-hover hover:-translate-y-1 transition-all duration-300">
                        <div class="flex items-center justify-between mb-4">
                            <p class="text-slate-500 dark:text-slate-500 text-xs font-black uppercase tracking-widest">Total Leads</p>
                            <div class="w-10 h-10 bg-indigo-50 dark:bg-indigo-500/10 rounded-xl flex items-center justify-center text-indigo-600 dark:text-indigo-400 border border-indigo-100 dark:border-none">
                                <i data-lucide="users" class="w-5 h-5"></i>
                            </div>
                        </div>
                        <h3 class="text-4xl font-extrabold text-slate-950 dark:text-white tracking-tight" x-text="leads.length">0</h3>
                        <p class="text-xs text-emerald-600 mt-2 font-bold">+5% este mês</p>
                    </div>
                    <div class="bg-panel-light dark:bg-panel-dark border border-border-light dark:border-border-dark p-7 rounded-3xl shadow-premium dark:shadow-dark-premium premium-card hover:shadow-premium-hover dark:hover:shadow-dark-premium-hover hover:-translate-y-1 transition-all duration-300 border-b-4 border-b-emerald-500 dark:border-b-emerald-500">
                        <div class="flex items-center justify-between mb-4">
                            <p class="text-slate-500 dark:text-slate-500 text-xs font-black uppercase tracking-widest">Vendas Fechadas</p>
                            <div class="w-10 h-10 bg-emerald-50 dark:bg-emerald-500/10 rounded-xl flex items-center justify-center text-emerald-600 dark:text-emerald-400 border border-emerald-100 dark:border-none">
                                <i data-lucide="award" class="w-5 h-5"></i>
                            </div>
                        </div>
                        <h3 class="text-4xl font-extrabold text-slate-950 dark:text-white tracking-tight" x-text="leads.filter(l => l.status === 'fechado').length">0</h3>
                        <p class="text-xs text-emerald-600 mt-2 font-bold">Meta: 15</p>
                    </div>
                </div>

                <div x-show="screen === 'kanban'" x-cloak class="flex gap-6 overflow-x-auto pb-6 no-scrollbar kanban-container h-full">
                    <template x-for="col in columns" :key="col.id">
                        <div class="kanban-col flex flex-col gap-4 bg-gray-100 dark:bg-slate-900/40 border border-gray-200 dark:border-slate-800/50 p-3 md:p-4 rounded-[2.5rem] transition-colors duration-200" @dragover.prevent @drop="updateStatus($event.dataTransfer.getData('id'), col.id)">
                            <div class="flex items-center justify-between px-3 pt-2">
                                <span class="text-xs font-black uppercase tracking-widest text-slate-600 dark:text-slate-300" x-text="col.name"></span>
                                <span class="text-xs bg-panel-light text-slate-950 border border-border-light dark:bg-slate-800 dark:text-white dark:border-slate-700 px-3 py-1.5 rounded-full font-bold shadow-premium dark:shadow-dark-premium" x-text="leads.filter(l => l.status === col.id).length"></span>
                            </div>
                            <div class="flex-1 overflow-y-auto flex flex-col gap-4 no-scrollbar pb-3">
                                <template x-for="lead in leads.filter(l => l.status === col.id)" :key="lead.id">
                                    <div draggable="true" @dragstart="$event.dataTransfer.setData('id', lead.id)" @click="openChat(lead)" 
                                         class="bg-panel-light border border-border-light shadow-premium dark:bg-panel-dark dark:border-slate-700 p-5 rounded-3xl premium-card cursor-pointer relative group active:scale-95 hover:shadow-premium-hover dark:hover:shadow-dark-premium-hover hover:-translate-y-1 transition-all duration-300">
                                        <h4 class="font-bold text-base text-slate-950 dark:text-white truncate pr-7 mb-2 tracking-tight" x-text="lead.nome"></h4>
                                        <p class="text-xs text-slate-500 dark:text-slate-400 flex items-center gap-1.5 bg-gray-50 dark:bg-slate-800 px-3 py-1.5 rounded-lg w-fit border border-gray-100 dark:border-slate-700"><i data-lucide="smartphone" class="w-3.5 h-3.5 text-indigo-500"></i> <span x-text="lead.numero" class="font-mono"></span></p>
                                        <i data-lucide="grip-vertical" class="absolute top-5 right-5 w-4 h-4 text-gray-300 group-hover:text-indigo-400 dark:text-slate-600 transition-colors"></i>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>

                <div x-show="screen === 'bot'" x-cloak class="space-y-8 max-w-5xl mx-auto">
                    <div class="bg-panel-light border border-border-light dark:bg-panel-dark dark:border-border-dark p-7 md:p-10 rounded-[2.5rem] shadow-premium dark:shadow-dark-premium transition-colors duration-200">
                        <div class="flex items-center gap-4 mb-8 pb-6 border-b border-gray-100 dark:border-slate-800">
                            <div class="w-14 h-14 bg-indigo-100 dark:bg-indigo-500/10 rounded-2xl flex items-center justify-center text-indigo-600 dark:text-indigo-400">
                                <i data-lucide="bot" class="w-7 h-7"></i>
                            </div>
                            <div>
                                <h3 class="font-extrabold text-xl dark:text-white tracking-tight">Nova Automação do Robô</h3>
                                <p class="text-sm text-slate-500">Defina um gatilho e a resposta automática.</p>
                            </div>
                        </div>

                        <input x-model="newRule.trigger" type="text" placeholder="Gatilho ex: tabela, audio, solar..." class="w-full bg-gray-50 border border-gray-200 text-slate-950 dark:bg-bg-dark dark:border-slate-700 rounded-xl p-4 text-sm dark:text-white mb-4 focus:ring-2 focus:ring-indigo-300 dark:focus:ring-indigo-800 outline-none transition-all">
                        
                        <textarea x-model="newRule.response" placeholder="Resposta de texto automática..." rows="3" class="w-full bg-gray-50 border border-gray-200 text-slate-950 dark:bg-bg-dark dark:border-slate-700 rounded-xl p-4 text-sm dark:text-white mb-5 focus:ring-2 focus:ring-indigo-300 dark:focus:ring-indigo-800 outline-none transition-all"></textarea>
                        
                        <div class="flex flex-col sm:flex-row sm:items-center gap-4 mb-8 bg-gray-50 dark:bg-bg-dark p-5 rounded-2xl border border-gray-100 dark:border-slate-700">
                            <input type="file" x-ref="botMediaInput" class="hidden" @change="botMediaFile = $event.target.files[0]">
                            <button @click="$refs.botMediaInput.click()" class="bg-white hover:bg-indigo-600 hover:text-white text-slate-700 dark:bg-slate-800 px-6 py-3.5 rounded-xl text-xs font-bold dark:text-slate-200 dark:hover:bg-indigo-600 dark:hover:text-white transition-all flex items-center justify-center gap-2 border border-gray-200 dark:border-slate-700 shadow-sm active:scale-95">
                                <i data-lucide="paperclip" class="w-4 h-4"></i> Anexar Áudio, Imagem ou PDF
                            </button>
                            <div x-show="botMediaFile" class="flex items-center gap-2 bg-indigo-50 border border-indigo-100 dark:bg-indigo-500/10 px-4 py-2.5 rounded-xl dark:border-indigo-500/30">
                                <i data-lucide="file-check" class="w-4 h-4 text-indigo-500 dark:text-indigo-400"></i>
                                <span x-text="botMediaFile?.name" class="text-xs text-indigo-700 dark:text-indigo-300 font-bold truncate max-w-[200px]"></span>
                                <button @click="botMediaFile = null; $refs.botMediaInput.value = ''" class="text-red-500 hover:text-red-600 ml-2"><i data-lucide="x-circle" class="w-4.5 h-4.5"></i></button>
                            </div>
                        </div>

                        <button @click="saveBotRule()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black text-sm py-4.5 rounded-2xl uppercase shadow-lg shadow-indigo-500/30 active:scale-95 transition-all tracking-wider">Salvar Automação</button>
                    </div>
                    
                    <div class="space-y-4">
                        <template x-for="rule in botRules" :key="rule.id">
                            <div class="bg-panel-light border border-border-light dark:bg-panel-dark dark:border-slate-800 p-5 rounded-2xl flex justify-between items-center shadow-premium dark:shadow-dark-premium hover:shadow-premium-hover dark:hover:shadow-dark-premium-hover transition-all duration-300">
                                <div class="flex-1 pr-6">
                                    <div class="flex gap-2.5 items-center">
                                        <span class="text-[10px] bg-indigo-50 text-indigo-700 border border-indigo-100 dark:border-none dark:bg-indigo-500/20 dark:text-indigo-400 px-3 py-1.5 rounded-full font-black uppercase tracking-widest" x-text="rule.trigger_text"></span>
                                        <span x-show="rule.media_url" class="text-[10px] bg-emerald-50 text-emerald-700 border border-emerald-100 dark:border-none dark:bg-emerald-500/20 dark:text-emerald-400 px-3 py-1.5 rounded-full font-black uppercase flex items-center gap-1.5 tracking-widest"><i data-lucide="paperclip" class="w-3.5 h-3.5"></i> Mídia</span>
                                    </div>
                                    <p class="text-sm text-slate-700 dark:text-slate-300 mt-3 line-clamp-2" x-text="rule.response_text || '(Apenas envio de arquivo)'"></p>
                                </div>
                                <button @click="deleteBotRule(rule.id)" class="text-slate-400 hover:text-red-500 dark:text-slate-600 dark:hover:text-red-500 p-3 bg-gray-50 dark:bg-slate-800 rounded-xl transition-colors"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                            </div>
                        </template>
                    </div>
                </div>

            </section>
        </main>

        <nav class="md:hidden fixed bottom-0 w-full glass pb-safe pt-2 px-6 flex justify-between items-center z-40 h-20 rounded-t-[2.5rem] border-t">
            <template x-for="item in navItems">
                <button @click="screen = item.id" :class="screen === item.id ? 'text-indigo-600 dark:text-indigo-400 scale-110 font-black' : 'text-slate-400 dark:text-slate-500'" class="flex flex-col items-center gap-1.5 p-2 transition-all duration-200">
                    <i :data-lucide="item.icon" class="w-6 h-6 shrink-0"></i>
                    <span class="text-[10px]" x-text="item.label"></span>
                </button>
            </template>
        </nav>

        <div x-show="isChatOpen" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0" x-transition:leave="transition ease-in duration-200" x-transition:leave-start="translate-x-0" x-transition:leave-end="translate-x-full" x-cloak 
             class="fixed inset-0 md:left-auto md:right-0 w-full md:w-[480px] bg-bg-light border-l border-border-light dark:bg-bg-dark dark:border-slate-800 z-[100] flex flex-col shadow-2xl shadow-slate-950/20 transition-colors duration-200">
            
            <header class="h-20 px-5 border-b border-border-light dark:border-slate-800 flex items-center bg-panel-light dark:bg-panel-dark z-10 shrink-0 justify-between transition-colors duration-200 rounded-t-3xl md:rounded-none">
                <div class="flex items-center overflow-hidden">
                    <button @click="isChatOpen = false" class="p-2.5 -ml-2 mr-1.5 text-slate-500 hover:text-slate-950 dark:text-slate-400 dark:hover:text-white rounded-xl transition-colors"><i data-lucide="arrow-left" class="w-6 h-6"></i></button>
                    <img :src="'https://api.dicebear.com/8.x/notionists/svg?seed=' + selectedLead?.nome" class="w-10 h-10 rounded-full bg-gray-100 dark:bg-slate-800 mr-3 border dark:border-slate-700">
                    <div class="truncate">
                        <h3 class="font-extrabold text-base text-slate-950 dark:text-white truncate tracking-tight" x-text="selectedLead?.nome"></h3>
                        <p class="text-[11px] text-emerald-600 dark:text-emerald-500 font-bold font-mono" x-text="selectedLead?.numero"></p>
                    </div>
                </div>
                
                <select x-model="selectedLeadStatus" @change="updateStatus(selectedLead.id, $event.target.value)" class="bg-gray-100 text-[10px] font-bold uppercase text-slate-700 border border-gray-200 dark:bg-slate-800 dark:text-white dark:border-slate-700 rounded-xl p-2.5 outline-none ml-2 shrink-0 transition-colors active:scale-95 shadow-sm">
                    <template x-for="col in columns" :key="col.id">
                        <option :value="col.id" x-text="col.name" :selected="selectedLead?.status === col.id"></option>
                    </template>
                </select>
            </header>

            <div class="absolute inset-0 top-20 bottom-[140px] bg-[#efeae2] dark:bg-[#0b141a] bg-chat-pattern opacity-50 dark:opacity-20 -z-0 transition-colors duration-200"></div>
            
            <div class="flex-1 overflow-y-auto p-5 space-y-4 z-10 scroll-smooth no-scrollbar" id="chat-box">
                <template x-for="msg in messages" :key="msg.id">
                    <div :class="msg.from_me ? 'justify-end' : 'justify-start'" class="flex w-full">
                        <div :class="msg.from_me ? 'bg-indigo-600 text-white rounded-l-2xl rounded-tr-2xl shadow-lg shadow-indigo-950/10' : 'bg-panel-light text-slate-950 border border-gray-100 dark:border-none dark:bg-slate-800 dark:text-slate-200 rounded-r-2xl rounded-tl-2xl shadow-premium dark:shadow-dark-premium'" class="p-4 max-w-[85%] relative transition-colors duration-200">
                            
                            <template x-if="msg.content && msg.content.includes('http') && (msg.content.includes('chat_media') || msg.content.includes('[Áudio]') || msg.content.includes('[Imagem]') || msg.content.includes('[Documento]'))">
                                <a :href="msg.content.split(' ').pop()" target="_blank" class="underline break-all text-sm flex items-center gap-1.5 font-bold" :class="msg.from_me ? 'text-indigo-100' : 'text-indigo-600 dark:text-indigo-400'">
                                    <i data-lucide="external-link" class="w-3.5 h-3.5"></i> Abrir Arquivo
                                </a>
                            </template>
                            <template x-if="msg.content && !msg.content.includes('chat_media')">
                                <p class="text-[15px] leading-relaxed break-words" x-text="msg.content"></p>
                            </template>
                            
                            <div class="flex items-center justify-end gap-1.5 mt-1.5 opacity-60">
                                <span class="text-[10px] font-bold" x-text="new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})"></span>
                                <template x-if="msg.from_me"><i data-lucide="check-check" class="w-3.5 h-3.5"></i></template>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <footer class="bg-panel-light border-t dark:bg-panel-dark dark:border-slate-800 flex flex-col z-10 pb-safe shrink-0 transition-colors duration-200 md:rounded-none rounded-b-3xl">
                <div class="flex gap-2.5 overflow-x-auto p-4 no-scrollbar border-b border-gray-100 dark:border-slate-800/50 bg-gray-50 dark:bg-slate-950/50">
                    <button @click="msgInput = 'Olá! Tudo bem? Sou o Igor, como posso ajudar?'" class="shrink-0 bg-panel-light text-slate-700 border border-border-light px-4 py-2 rounded-full text-[10px] font-bold dark:bg-slate-800 dark:text-slate-300 dark:border-slate-700 transition-all hover:bg-indigo-600 hover:text-white dark:hover:bg-indigo-600 dark:hover:text-white active:scale-95 shadow-sm">👋 Saudação</button>
                    <button @click="msgInput = 'Vou enviar os detalhes das campanhas de tráfego pago.'" class="shrink-0 bg-panel-light text-slate-700 border border-border-light px-4 py-2 rounded-full text-[10px] font-bold dark:bg-slate-800 dark:text-slate-300 dark:border-slate-700 transition-all hover:bg-indigo-600 hover:text-white dark:hover:bg-indigo-600 dark:hover:text-white active:scale-95 shadow-sm">📈 Tráfego</button>
                    <button @click="msgInput = 'A energia solar reduz seus custos drasticamente.'" class="shrink-0 bg-panel-light text-slate-700 border border-border-light px-4 py-2 rounded-full text-[10px] font-bold dark:bg-slate-800 dark:text-slate-300 dark:border-slate-700 transition-all hover:bg-indigo-600 hover:text-white dark:hover:bg-indigo-600 dark:hover:text-white active:scale-95 shadow-sm">☀️ Solar</button>
                </div>
                
                <input type="file" x-ref="imageInput" accept="image/*" class="hidden" @change="uploadAndSend($event, 'image')">
                <input type="file" x-ref="audioInput" accept="audio/*" class="hidden" @change="uploadAndSend($event, 'audio')">
                <input type="file" x-ref="docInput" accept=".pdf,.doc,.docx,.xls,.xlsx,.txt" class="hidden" @change="uploadAndSend($event, 'document')">

                <div class="flex items-center gap-2 p-4">
                    <div class="flex gap-0.5">
                        <button @click="$refs.imageInput.click()" class="p-3 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 dark:text-slate-400 dark:hover:text-indigo-400 dark:hover:bg-slate-800 rounded-xl transition-colors" title="Enviar Imagem"><i data-lucide="image" class="w-5 h-5"></i></button>
                        <button @click="$refs.audioInput.click()" class="p-3 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 dark:text-slate-400 dark:hover:text-indigo-400 dark:hover:bg-slate-800 rounded-xl transition-colors" title="Enviar Áudio"><i data-lucide="mic" class="w-5 h-5"></i></button>
                        <button @click="$refs.docInput.click()" class="p-3 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 dark:text-slate-400 dark:hover:text-indigo-400 dark:hover:bg-slate-800 rounded-xl transition-colors" title="Enviar Documento"><i data-lucide="file-text" class="w-5 h-5"></i></button>
                    </div>
                    <div class="flex-1 bg-gray-100 dark:bg-slate-950 rounded-xl flex items-center px-4 border border-gray-200 dark:border-slate-800 focus-within:border-indigo-400 focus-within:ring-1 focus-within:ring-indigo-400 transition-all">
                        <input x-model="msgInput" @keydown.enter="sendMsg()" type="text" placeholder="Escreva a mensagem..." class="w-full bg-transparent py-4 text-[15px] text-slate-950 dark:text-white outline-none">
                    </div>
                    <button @click="sendMsg()" class="w-14 h-14 rounded-2xl bg-indigo-600 flex items-center justify-center text-white shrink-0 active:scale-95 shadow-lg shadow-indigo-500/30 transition-transform"><i data-lucide="send" class="w-6 h-6 ml-1"></i></button>
                </div>
            </footer>
        </div>
    </div>

    <script>
        function crmApp() {
            return {
                screen: 'dash', isChatOpen: false, selectedLead: null, selectedLeadStatus: '', msgInput: '', leads: [], messages: [], 
                botRules: [], newRule: { trigger: '', response: '' }, botMediaFile: null,
                
                isDarkMode: localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches),
                
                navItems: [
                    { id: 'dash', label: 'Dashboard', icon: 'pie-chart' }, { id: 'kanban', label: 'Funil de Vendas', icon: 'columns' }, { id: 'bot', label: 'Robô Auto', icon: 'bot' }
                ],
                columns: [
                    { id: 'novo_lead', name: 'Triagem / IA' }, { id: 'atendimento', name: 'Negociação' }, { id: 'proposta', name: 'Proposta' }, { id: 'fechado', name: 'Venda' }
                ],
                
                async init() {
                    const SB_URL = 'https://qhnbisjogpdoyszpsucs.supabase.co';
                    const SB_KEY = 'sb_publishable_3PAly_BCdvoldAzm1Y7SxQ_S3rp2QhQ';
                    this.client = supabase.createClient(SB_URL, SB_KEY);
                    await this.loadLeads();
                    await this.loadBotRules();
                    this.setupRealtime();
                    setTimeout(() => lucide.createIcons(), 100);
                },

                toggleTheme() {
                    this.isDarkMode = !this.isDarkMode;
                    localStorage.setItem('theme', this.isDarkMode ? 'dark' : 'light');
                    setTimeout(() => lucide.createIcons(), 50);
                },

                playSound() {
                    const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3');
                    audio.play().catch(e => console.log("Áudio silenciado até interação do usuário."));
                },

                async loadLeads() {
                    const { data } = await this.client.from('leads').select('*').order('created_at', { ascending: false });
                    if (data) this.leads = data;
                    setTimeout(() => lucide.createIcons(), 50);
                },
                
                async updateStatus(id, status) {
                    if (!id) return;
                    await this.client.from('leads').update({ status }).eq('id', id);
                    const lead = this.leads.find(l => l.id == id);
                    if(lead) lead.status = status; 
                },

                async openChat(lead) {
                    this.selectedLead = lead; this.selectedLeadStatus = lead.status; this.isChatOpen = true; this.messages = [];
                    const { data } = await this.client.from('messages').select('*').eq('lead_id', lead.id).order('timestamp', { ascending: true });
                    this.messages = data || []; this.scrollToBottom();
                    setTimeout(() => lucide.createIcons(), 50);
                },

                async sendMsg() {
                    if(!this.msgInput || !this.selectedLead) return;
                    const text = this.msgInput; this.msgInput = '';
                    this.messages.push({ id: Date.now(), content: text, from_me: true, timestamp: new Date().toISOString() });
                    this.scrollToBottom();

                    try {
                        await fetch('https://projeto-evolution-api.xtknqq.easypanel.host/message/sendText/igor', {
                            method: 'POST', headers: { 'apikey': '773C15E29974-4BA2-B003-3F697EC279AE', 'Content-Type': 'application/json' }, body: JSON.stringify({ "number": this.selectedLead.numero, "text": text })
                        });
                        await this.client.from('messages').insert({ lead_id: this.selectedLead.id, content: text, from_me: true, type: 'text' });
                    } catch (e) { console.error("Erro ao enviar:", e); }
                },

                async uploadAndSend(event, type) {
                    const file = event.target.files[0];
                    if (!file) return;
                    if (!this.selectedLead) { alert("Abra o chat de um cliente."); event.target.value = ''; return; }
                    
                    const tempMsgId = Date.now();
                    this.messages.push({ id: tempMsgId, content: `⏳ Upload em andamento...`, from_me: true, timestamp: new Date().toISOString() });
                    this.scrollToBottom();

                    try {
                        const fileExt = file.name.split('.').pop();
                        const fileName = `${Date.now()}-${Math.random().toString(36).substring(7)}.${fileExt}`;
                        const filePath = `${this.selectedLead.numero}/${fileName}`;

                        const { error: uploadError } = await this.client.storage.from('chat_media').upload(filePath, file, { upsert: false });
                        if (uploadError) throw new Error(`Erro Supabase: ${uploadError.message}`);

                        const { data: urlData } = this.client.storage.from('chat_media').getPublicUrl(filePath);
                        const publicMediaUrl = urlData.publicUrl;

                        this.messages.find(m => m.id === tempMsgId).content = `⏳ Disparando WhatsApp...`;

                        let endpoint = 'sendMedia';
                        let bodyData = { "number": this.selectedLead.numero, "media": publicMediaUrl };

                        if (type === 'image') { bodyData.mediatype = 'image'; } 
                        else if (type === 'audio') { endpoint = 'sendWhatsAppAudio'; delete bodyData.media; bodyData.audio = publicMediaUrl; } 
                        else { bodyData.mediatype = 'document'; bodyData.fileName = file.name; }

                        const evoResponse = await fetch(`https://projeto-evolution-api.xtknqq.easypanel.host/message/${endpoint}/igor`, {
                            method: 'POST', headers: { 'apikey': '773C15E29974-4BA2-B003-3F697EC279AE', 'Content-Type': 'application/json' }, body: JSON.stringify(bodyData)
                        });

                        if (!evoResponse.ok) throw new Error("A API rejeitou o arquivo.");

                        this.messages.find(m => m.id === tempMsgId).content = `✅ Enviado: ${publicMediaUrl}`;
                        await this.client.from('messages').insert({ lead_id: this.selectedLead.id, content: `[${type.toUpperCase()}] ${publicMediaUrl}`, from_me: true, type: type, media_url: publicMediaUrl });
                        event.target.value = '';
                    } catch (e) {
                        alert(`❌ ERRO: ${e.message}`);
                        this.messages.find(m => m.id === tempMsgId).content = `❌ Falha no envio.`;
                        event.target.value = '';
                    }
                },

                async saveBotRule() {
                    if(!this.newRule.trigger) { alert("⚠️ O gatilho é obrigatório."); return; }
                    if(!this.newRule.response && !this.botMediaFile) { alert("⚠️ Adicione texto ou anexe uma mídia."); return; }
                    
                    try {
                        let mediaUrl = null;
                        let mediaType = null;

                        if (this.botMediaFile) {
                            const fileExt = this.botMediaFile.name.split('.').pop();
                            const fileName = `bot-${Date.now()}-${Math.random().toString(36).substring(7)}.${fileExt}`;
                            
                            const { error: uploadError } = await this.client.storage.from('chat_media').upload(`bot_media/${fileName}`, this.botMediaFile);
                            if (uploadError) throw new Error("Erro ao subir mídia do robô: " + uploadError.message);
                            
                            const { data: urlData } = this.client.storage.from('chat_media').getPublicUrl(`bot_media/${fileName}`);
                            mediaUrl = urlData.publicUrl;

                            if (this.botMediaFile.type.includes('image')) mediaType = 'image';
                            else if (this.botMediaFile.type.includes('audio')) mediaType = 'audio';
                            else mediaType = 'document';
                        }

                        const { error } = await this.client.from('chatbot_rules').insert({
                            trigger_text: this.newRule.trigger.toLowerCase().trim(),
                            response_text: this.newRule.response.trim(),
                            media_url: mediaUrl,
                            media_type: mediaType
                        });

                        if (error) throw new Error(error.message);
                        
                        alert("✅ Regra Automática salva com sucesso!");
                        this.newRule = { trigger: '', response: '' };
                        this.botMediaFile = null;
                        this.$refs.botMediaInput.value = '';
                        this.loadBotRules();
                    } catch (err) { alert(`❌ Falha: ${err.message}`); }
                },

                async loadBotRules() {
                    const { data, error } = await this.client.from('chatbot_rules').select('*').order('created_at', { ascending: false });
                    if (!error && data) { this.botRules = data; setTimeout(() => lucide.createIcons(), 50); }
                },

                async deleteBotRule(id) {
                    if(!confirm("Apagar essa regra?")) return;
                    await this.client.from('chatbot_rules').delete().eq('id', id);
                    this.loadBotRules();
                },

                setupRealtime() {
                    this.client.channel('leads_channel').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'leads' }, () => { this.playSound(); this.loadLeads(); }).subscribe();
                    this.client.channel('leads_update').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'leads' }, () => this.loadLeads()).subscribe();
                    this.client.channel('msgs_channel').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                        if (!payload.new.from_me) this.playSound();
                        if (this.isChatOpen && payload.new.lead_id === this.selectedLead?.id) {
                            if(!this.messages.find(m => m.id === payload.new.id)) { this.messages.push(payload.new); this.scrollToBottom(); }
                        }
                    }).subscribe();
                },
                scrollToBottom() { setTimeout(() => { const b = document.getElementById('chat-box'); if(b) b.scrollTop = b.scrollHeight; }, 100); }
            }
        }
    </script>
</body>
</html>
