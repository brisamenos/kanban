<!DOCTYPE html>
<html lang="pt-br" x-data="crmApp()" :class="{ 'dark': isDarkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EvoCRM Pro | Igor Borges</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: {
                    colors: {
                        panel: { light: '#FFFFFF', dark: '#0f172a' },
                        bg: { light: '#f8fafc', dark: '#020617' },
                    }
                } 
            }
        }
    </script>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://bernardo-castilho.github.io/DragDropTouch/DragDropTouch.js"></script>

    <style>
        [x-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .kanban-col { min-width: 88vw; max-width: 88vw; height: calc(100vh - 180px); scroll-snap-align: center; }
        @media (min-width: 768px) { .kanban-col { min-width: 320px; max-width: 320px; height: calc(100vh - 200px); } }
        .kanban-container { scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
        .glass { background: rgba(255, 255, 255, 0.9) !important; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .dark .glass { background: rgba(15, 23, 42, 0.9) !important; }
        .bg-chat-pattern { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .pt-safe { padding-top: env(safe-area-inset-top); }
        body { touch-action: pan-y; overscroll-behavior-y: contain; }
        
        /* NOVO: Estilo visual do Flow Builder (Linha do tempo) */
        .flow-line::before {
            content: ''; position: absolute; left: 1.25rem; top: 2.5rem; bottom: -1rem; width: 2px; background: #e2e8f0; z-index: 0;
        }
        .dark .flow-line::before { background: #1e293b; }
        .flow-item:last-child .flow-line::before { display: none; }
    </style>
</head>
<body class="bg-bg-light text-slate-800 dark:bg-bg-dark dark:text-slate-200 antialiased font-sans overflow-hidden transition-colors duration-300">

    <div class="flex h-screen w-full relative pt-safe">
        
        <aside class="w-64 glass border-r hidden md:flex flex-col z-20">
            <div class="p-6 flex items-center gap-3 border-b border-gray-100 dark:border-slate-800/50">
                <div class="w-9 h-9 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-500/40">
                    <i data-lucide="zap" class="text-white w-5 h-5"></i>
                </div>
                <h1 class="font-black text-xl tracking-tighter dark:text-white">EVO<span class="text-indigo-500">PRO</span></h1>
            </div>
            <nav class="flex-1 px-4 space-y-1.5 mt-4">
                <template x-for="item in navItems">
                    <button @click="screen = item.id" :class="screen === item.id ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-500 dark:text-slate-400 hover:bg-gray-100 dark:hover:bg-slate-800'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold transition-all">
                        <i :data-lucide="item.icon" class="w-4 h-4"></i> <span x-text="item.label"></span>
                    </button>
                </template>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col relative w-full h-full overflow-hidden">
            <header class="h-14 md:h-20 px-4 md:px-10 flex items-center justify-between glass border-b shrink-0 z-10">
                <div class="flex items-center gap-2">
                    <div class="md:hidden w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center shadow-md"><i data-lucide="zap" class="text-white w-4 h-4"></i></div>
                    <h2 class="font-black text-base md:text-xl tracking-tight dark:text-white" x-text="navItems.find(i => i.id === screen)?.label || 'CRM'"></h2>
                </div>
                <button @click="toggleTheme()" class="p-2 text-slate-500 dark:text-slate-300"><i :data-lucide="isDarkMode ? 'sun' : 'moon'" class="w-5 h-5"></i></button>
            </header>

            <section class="flex-1 overflow-y-auto p-3 md:p-8 no-scrollbar">
                
                <div x-show="screen === 'dash'" x-cloak class="grid grid-cols-2 gap-3">
                    <div class="bg-white dark:bg-slate-900 p-5 rounded-3xl border border-gray-100 dark:border-slate-800 shadow-sm text-center">
                        <p class="text-slate-500 text-[10px] font-black uppercase mb-1">Leads</p>
                        <h3 class="text-3xl font-black dark:text-white" x-text="leads.length">0</h3>
                    </div>
                    <div class="bg-white dark:bg-slate-900 p-5 rounded-3xl border border-gray-100 dark:border-slate-800 border-b-4 border-b-emerald-500 shadow-sm text-center">
                        <p class="text-slate-500 text-[10px] font-black uppercase mb-1">Vendas</p>
                        <h3 class="text-3xl font-black dark:text-white" x-text="leads.filter(l => l.status === 'fechado').length">0</h3>
                    </div>
                </div>

                <div x-show="screen === 'kanban'" x-cloak class="flex gap-4 overflow-x-auto pb-4 no-scrollbar kanban-container h-full">
                    <template x-for="col in columns" :key="col.id">
                        <div class="kanban-col flex flex-col gap-3 bg-slate-200/40 dark:bg-slate-900/40 p-3 rounded-[2rem]" @dragover.prevent @drop="updateStatus($event.dataTransfer.getData('id'), col.id)">
                            <div class="flex items-center justify-between px-2">
                                <span class="text-[10px] font-black uppercase text-slate-500" x-text="col.name"></span>
                                <span class="text-[10px] bg-white dark:bg-slate-800 px-2 py-1 rounded-full font-bold dark:text-white shadow-sm" x-text="leads.filter(l => l.status === col.id).length"></span>
                            </div>
                            <div class="flex-1 overflow-y-auto flex flex-col gap-3 no-scrollbar">
                                <template x-for="lead in leads.filter(l => l.status === col.id)" :key="lead.id">
                                    <div draggable="true" @dragstart="$event.dataTransfer.setData('id', lead.id)" @click="openChat(lead)" class="bg-white dark:bg-slate-800 p-3 rounded-2xl shadow-sm border border-gray-100 dark:border-slate-700/50 active:scale-[0.98]">
                                        <div class="flex items-center gap-3">
                                            <div class="relative flex-shrink-0">
                                                <img :src="lead.foto_url || 'https://api.dicebear.com/8.x/notionists/svg?seed=' + lead.nome" class="w-10 h-10 rounded-xl object-cover bg-slate-100" @error="$el.src = 'https://api.dicebear.com/8.x/notionists/svg?seed=' + lead.nome">
                                                <div class="absolute -bottom-1 -right-1 w-3 h-3 bg-emerald-500 border-2 border-white dark:border-slate-800 rounded-full"></div>
                                            </div>
                                            <div class="flex-1 overflow-hidden">
                                                <h4 class="font-bold text-sm text-slate-900 dark:text-white truncate" x-text="lead.nome"></h4>
                                                <p class="text-[10px] text-slate-500" x-text="lead.numero"></p>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>

                <div x-show="screen === 'disparo'" x-cloak class="max-w-xl mx-auto space-y-4 pb-20">
                    <div class="bg-white dark:bg-slate-900 p-6 rounded-[2rem] border dark:border-slate-800 shadow-sm">
                        <h3 class="font-black text-lg mb-4 dark:text-white flex items-center gap-2">
                            <i data-lucide="send" class="w-5 h-5 text-indigo-500"></i> Disparo em Massa
                        </h3>
                        <div class="space-y-4">
                            <select x-model="disparoConfig.status" :disabled="disparoConfig.isRunning" class="w-full bg-slate-50 dark:bg-slate-950 border dark:border-slate-800 rounded-xl p-3 text-sm dark:text-white outline-none">
                                <option value="todos">Todos os Leads</option>
                                <template x-for="col in columns" :key="col.id"><option :value="col.id" x-text="col.name"></option></template>
                            </select>
                            <textarea x-model="disparoConfig.msg" :disabled="disparoConfig.isRunning" rows="3" placeholder="{Oi|Olá} {nome}, tudo bem?" class="w-full bg-slate-50 dark:bg-slate-950 border dark:border-slate-800 rounded-xl p-4 text-sm dark:text-white outline-none"></textarea>
                            <div class="p-4 bg-slate-50 dark:bg-slate-950 rounded-2xl border dark:border-slate-800 flex justify-center gap-4 items-center">
                                <input type="file" x-ref="disparoFile" class="hidden" @change="disparoConfig.file = $event.target.files[0]">
                                <button @click="$refs.disparoFile.click()" class="text-indigo-600 font-bold text-xs"><i data-lucide="paperclip" class="w-4 h-4 inline mr-1"></i> Anexar Arquivo</button>
                                <span class="text-xs text-slate-500 truncate max-w-[150px]" x-text="disparoConfig.file?.name || 'Nenhum anexo'"></span>
                            </div>
                            <div class="flex gap-2">
                                <input x-model="disparoConfig.minDelay" type="number" placeholder="Min seg" class="w-full bg-slate-50 dark:bg-slate-950 border dark:border-slate-800 rounded-xl p-3 text-sm dark:text-white outline-none">
                                <input x-model="disparoConfig.maxDelay" type="number" placeholder="Max seg" class="w-full bg-slate-50 dark:bg-slate-950 border dark:border-slate-800 rounded-xl p-3 text-sm dark:text-white outline-none">
                            </div>
                            <div x-show="disparoConfig.isRunning" class="text-center text-xs font-bold text-indigo-500 animate-pulse" x-text="`Enviando: ${disparoConfig.sent}/${disparoConfig.total}`"></div>
                            <button x-show="!disparoConfig.isRunning" @click="iniciarDisparo()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-xl shadow-lg">Iniciar Campanha</button>
                            <button x-show="disparoConfig.isRunning" @click="pararDisparo()" class="w-full bg-red-500 text-white font-black py-4 rounded-xl shadow-lg">Parar</button>
                        </div>
                    </div>
                </div>

                <div x-show="screen === 'bot'" x-cloak class="max-w-2xl mx-auto space-y-6 pb-24">
                    
                    <div class="bg-white dark:bg-slate-900 p-6 md:p-8 rounded-[2rem] border dark:border-slate-800 shadow-sm">
                        <h3 class="font-black text-xl mb-1 dark:text-white flex items-center gap-2">
                            <i data-lucide="git-merge" class="text-indigo-500 w-6 h-6"></i> Construtor de Fluxos
                        </h3>
                        <p class="text-xs text-slate-500 mb-6">Crie sequências inteiras com áudios, imagens e pausas.</p>
                        
                        <div class="mb-6">
                            <label class="text-[10px] font-black uppercase text-slate-400 mb-2 block ml-1">Palavra Gatilho</label>
                            <input x-model="flowBuilder.trigger" type="text" placeholder="Ex: chip, tabela..." class="w-full bg-indigo-50/50 dark:bg-slate-950 border border-indigo-100 dark:border-slate-700 rounded-xl p-4 font-bold outline-none dark:text-white focus:ring-2 focus:ring-indigo-500 transition-all">
                        </div>

                        <div class="space-y-4 relative mb-6">
                            <template x-for="(step, index) in flowBuilder.steps" :key="index">
                                <div class="relative flow-item pb-2">
                                    <div class="flow-line"></div>
                                    <div class="flex gap-3 relative z-10">
                                        <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 border-[3px] border-white dark:border-slate-900 shadow-sm"
                                             :class="{'bg-blue-100 text-blue-600': step.type === 'text', 'bg-green-100 text-green-600': step.type === 'audio', 'bg-purple-100 text-purple-600': step.type === 'image', 'bg-orange-100 text-orange-600': step.type === 'document', 'bg-slate-200 text-slate-600': step.type === 'delay'}">
                                            <i :data-lucide="step.type === 'text' ? 'message-square' : step.type === 'audio' ? 'mic' : step.type === 'image' ? 'image' : step.type === 'document' ? 'file-text' : 'clock'" class="w-4 h-4"></i>
                                        </div>
                                        <div class="flex-1 bg-slate-50 dark:bg-slate-950 border border-gray-100 dark:border-slate-800 rounded-2xl p-4">
                                            <div class="flex justify-between items-center mb-2">
                                                <span class="text-[10px] font-black uppercase text-slate-500" x-text="step.type === 'delay' ? 'Pausa' : 'Enviar ' + step.type"></span>
                                                <button @click="removeStep(index)" class="text-red-400 hover:text-red-600"><i data-lucide="x" class="w-4 h-4"></i></button>
                                            </div>
                                            <template x-if="step.type === 'text'">
                                                <textarea x-model="step.content" rows="2" placeholder="Escreva a mensagem..." class="w-full bg-transparent text-sm outline-none dark:text-white resize-none"></textarea>
                                            </template>
                                            <template x-if="step.type === 'delay'">
                                                <div class="flex items-center gap-2">
                                                    <input x-model="step.content" type="number" step="1000" class="w-24 bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-lg p-2 text-sm outline-none dark:text-white text-center">
                                                    <span class="text-[10px] text-slate-500 font-bold uppercase">Milissegundos (2000 = 2s)</span>
                                                </div>
                                            </template>
                                            <template x-if="['image', 'audio', 'document'].includes(step.type)">
                                                <div>
                                                    <input type="file" :accept="step.type === 'image' ? 'image/*' : step.type === 'audio' ? 'audio/*' : '*'" class="hidden" :id="'file-'+index" @change="attachFileToStep($event, index)">
                                                    <button @click="document.getElementById('file-'+index).click()" class="bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 px-3 py-1.5 rounded-lg text-xs font-bold shadow-sm">Selecionar Arquivo</button>
                                                    <span class="text-xs text-indigo-500 font-bold ml-2 truncate block mt-2" x-text="step.fileName || ''"></span>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>

                        <div class="flex flex-wrap gap-2 mb-6">
                            <button @click="addStep('text')" class="flex-1 min-w-[70px] flex flex-col items-center gap-1 p-2 bg-blue-50 dark:bg-blue-900/20 text-blue-600 rounded-xl active:scale-95"><i data-lucide="message-square" class="w-4 h-4"></i><span class="text-[9px] font-bold">Texto</span></button>
                            <button @click="addStep('audio')" class="flex-1 min-w-[70px] flex flex-col items-center gap-1 p-2 bg-green-50 dark:bg-green-900/20 text-green-600 rounded-xl active:scale-95"><i data-lucide="mic" class="w-4 h-4"></i><span class="text-[9px] font-bold">Áudio</span></button>
                            <button @click="addStep('image')" class="flex-1 min-w-[70px] flex flex-col items-center gap-1 p-2 bg-purple-50 dark:bg-purple-900/20 text-purple-600 rounded-xl active:scale-95"><i data-lucide="image" class="w-4 h-4"></i><span class="text-[9px] font-bold">Imagem</span></button>
                            <button @click="addStep('document')" class="flex-1 min-w-[70px] flex flex-col items-center gap-1 p-2 bg-orange-50 dark:bg-orange-900/20 text-orange-600 rounded-xl active:scale-95"><i data-lucide="file-text" class="w-4 h-4"></i><span class="text-[9px] font-bold">Arquivo</span></button>
                            <button @click="addStep('delay')" class="flex-1 min-w-[70px] flex flex-col items-center gap-1 p-2 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-xl active:scale-95"><i data-lucide="clock" class="w-4 h-4"></i><span class="text-[9px] font-bold">Pausa</span></button>
                        </div>

                        <button @click="saveFlow()" :disabled="isSavingFlow" class="w-full bg-indigo-600 text-white font-black py-4 rounded-xl shadow-md flex justify-center items-center gap-2">
                            <span x-show="!isSavingFlow"><i data-lucide="save" class="w-4 h-4 inline"></i> Salvar Fluxo</span>
                            <span x-show="isSavingFlow" class="animate-pulse">⏳ Salvando arquivos...</span>
                        </button>
                    </div>

                    <div class="space-y-3">
                        <h4 class="font-black text-sm text-slate-500 ml-2 uppercase tracking-widest">Ativos</h4>
                        <template x-for="rule in botRules" :key="rule.id">
                            <div class="bg-white dark:bg-slate-900 p-4 rounded-2xl flex justify-between items-center border border-gray-100 dark:border-slate-800 shadow-sm">
                                <div>
                                    <span class="text-[10px] bg-indigo-100 dark:bg-indigo-900 text-indigo-700 dark:text-indigo-300 px-3 py-1 rounded-full font-black uppercase mb-1 inline-block" x-text="rule.trigger_text"></span>
                                    <p class="text-xs text-slate-500 font-medium" x-text="rule.flow_steps ? `${rule.flow_steps.length} passos configurados` : (rule.response_text || 'Mídia Legado')"></p>
                                </div>
                                <button @click="deleteBotRule(rule.id)" class="bg-red-50 dark:bg-red-900/20 text-red-500 p-3 rounded-xl"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </template>
                    </div>
                </div>

            </section>
        </main>

        <div x-show="isChatOpen" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0" x-transition:leave="transition ease-in duration-150" x-transition:leave-start="translate-x-0" x-transition:leave-end="translate-x-full" x-cloak 
             class="fixed inset-0 bg-white dark:bg-slate-950 z-[100] flex flex-col md:left-auto md:right-0 md:w-[450px] md:border-l dark:border-slate-800">
            
            <header class="h-16 px-4 border-b dark:border-slate-800 flex items-center bg-white dark:bg-slate-900 shrink-0 justify-between">
                <div class="flex items-center overflow-hidden">
                    <button @click="isChatOpen = false" class="p-2 -ml-2 mr-1 text-slate-400"><i data-lucide="arrow-left" class="w-6 h-6"></i></button>
                    <img :src="selectedLead?.foto_url || 'https://api.dicebear.com/8.x/notionists/svg?seed=' + selectedLead?.nome" class="w-9 h-9 rounded-xl mr-3 border dark:border-slate-700 object-cover">
                    <div class="truncate">
                        <h3 class="font-bold text-sm text-slate-950 dark:text-white truncate" x-text="selectedLead?.nome"></h3>
                        <p class="text-[10px] text-emerald-500 font-bold" x-text="selectedLead?.numero"></p>
                    </div>
                </div>
                <select x-model="selectedLeadStatus" @change="updateStatus(selectedLead.id, $event.target.value)" class="bg-slate-100 dark:bg-slate-800 text-[9px] font-black uppercase p-2 rounded-xl outline-none dark:text-white">
                    <template x-for="col in columns" :key="col.id">
                        <option :value="col.id" x-text="col.name"></option>
                    </template>
                </select>
            </header>

            <div class="absolute inset-0 top-16 bottom-[140px] bg-[#efeae2] dark:bg-[#0b141a] bg-chat-pattern opacity-30 dark:opacity-10 -z-0"></div>
            
            <div class="flex-1 overflow-y-auto p-4 space-y-4 z-10 scroll-smooth no-scrollbar" id="chat-box">
                <template x-for="msg in messages" :key="msg.id">
                    <div :class="msg.from_me ? 'justify-end' : 'justify-start'" class="flex w-full">
                        <div :class="msg.from_me ? 'bg-indigo-600 text-white rounded-l-2xl rounded-tr-2xl' : 'bg-white dark:bg-slate-800 dark:text-slate-200 rounded-r-2xl rounded-tl-2xl shadow-sm'" class="p-3.5 max-w-[85%] relative">
                            
                            <template x-if="msg.type === 'audio' || (msg.content && msg.content.includes('ogg'))">
                                <audio controls :src="extractUrl(msg.content)" class="w-56 h-10 outline-none"></audio>
                            </template>
                            <template x-if="msg.type === 'image' || (msg.content && msg.content.includes('jpg'))">
                                <img :src="extractUrl(msg.content)" class="max-w-[220px] rounded-lg cursor-pointer shadow-sm" @click="window.open(extractUrl(msg.content), '_blank')">
                            </template>
                            <template x-if="msg.type === 'video' || (msg.content && msg.content.includes('mp4'))">
                                <video controls :src="extractUrl(msg.content)" class="max-w-[220px] rounded-lg shadow-sm"></video>
                            </template>
                            <template x-if="(msg.type === 'document' || msg.content.includes('http')) && !msg.content.includes('ogg') && !msg.content.includes('jpg') && !msg.content.includes('mp4') && msg.type !== 'image' && msg.type !== 'audio' && msg.type !== 'video'">
                                <a :href="extractUrl(msg.content)" target="_blank" class="underline text-xs font-bold block"><i data-lucide="external-link" class="w-3 h-3 inline"></i> Ver Arquivo</a>
                            </template>
                            <template x-if="msg.type === 'text' || (!msg.content.includes('http') && msg.type !== 'audio' && msg.type !== 'image' && msg.type !== 'video' && msg.type !== 'document')">
                                <p class="text-sm font-medium leading-relaxed break-words whitespace-pre-wrap" x-text="formatText(msg.content)"></p>
                            </template>

                            <div class="flex justify-end mt-1 opacity-50"><span class="text-[9px] font-black" x-text="new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})"></span></div>
                        </div>
                    </div>
                </template>
            </div>

            <footer class="bg-white dark:bg-slate-900 border-t dark:border-slate-800 p-3 z-10 pb-safe shrink-0">
                <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                    <button @click="msgInput = 'Olá! Tudo bem?'" class="shrink-0 bg-slate-100 dark:bg-slate-800 text-[9px] font-black px-3 py-1.5 rounded-full dark:text-white">👋 Oi</button>
                    <template x-for="rule in botRules" :key="rule.id">
                        <button @click="triggerBotRuleManual(rule)" class="shrink-0 bg-indigo-50 dark:bg-indigo-900/40 text-[9px] font-black px-3 py-1.5 rounded-full text-indigo-600 dark:text-indigo-300 border border-indigo-100 dark:border-indigo-800">🤖 <span x-text="rule.trigger_text"></span></button>
                    </template>
                </div>

                <div class="flex items-center gap-2">
                    <div class="flex">
                        <input type="file" x-ref="iI" class="hidden" @change="uploadAndSend($event, 'image')">
                        <input type="file" x-ref="aI" class="hidden" @change="uploadAndSend($event, 'audio')">
                        <input type="file" x-ref="dI" class="hidden" @change="uploadAndSend($event, 'document')">
                        <button @click="$refs.iI.click()" class="p-2 text-slate-400"><i data-lucide="image" class="w-5 h-5"></i></button>
                        <button @click="$refs.aI.click()" class="p-2 text-slate-400"><i data-lucide="mic" class="w-5 h-5"></i></button>
                        <button @click="$refs.dI.click()" class="p-2 text-slate-400"><i data-lucide="file-text" class="w-5 h-5"></i></button>
                    </div>
                    <div class="flex-1 bg-slate-50 dark:bg-slate-950 rounded-xl flex items-center px-3 border dark:border-slate-800">
                        <input x-model="msgInput" @keydown.enter="sendMsg()" type="text" placeholder="Mensagem..." class="w-full bg-transparent py-3 text-sm dark:text-white outline-none">
                    </div>
                    <button @click="sendMsg()" class="w-12 h-12 rounded-xl bg-indigo-600 flex items-center justify-center text-white active:scale-90 transition-all"><i data-lucide="send" class="w-5 h-5"></i></button>
                </div>
            </footer>
        </div>

        <nav class="md:hidden fixed bottom-0 w-full glass flex justify-between items-center z-40 h-16 px-6 border-t dark:border-slate-800 pb-safe">
            <template x-for="item in navItems">
                <button @click="screen = item.id" :class="screen === item.id ? 'text-indigo-600 scale-110 font-black' : 'text-slate-400'" class="flex flex-col items-center gap-1 transition-all">
                    <i :data-lucide="item.icon" class="w-5 h-5"></i>
                    <span class="text-[9px]" x-text="item.label"></span>
                </button>
            </template>
        </nav>
    </div>

    <script>
        function crmApp() {
            return {
                screen: 'bot', // Abre no bot para você testar logo
                isChatOpen: false, selectedLead: null, selectedLeadStatus: '', msgInput: '', leads: [], messages: [], botRules: [],
                isDarkMode: localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches),
                
                // NOVO: Estado do Flow Builder
                flowBuilder: { trigger: '', steps: [] },
                isSavingFlow: false,

                // Disparo Estado Mantido
                disparoConfig: { status: 'todos', msg: '', minDelay: 30, maxDelay: 60, isRunning: false, sent: 0, total: 0, file: null },
                
                navItems: [
                    { id: 'dash', label: 'Dash', icon: 'pie-chart' }, 
                    { id: 'kanban', label: 'Funil', icon: 'columns' }, 
                    { id: 'bot', label: 'Robô', icon: 'bot' },
                    { id: 'disparo', label: 'Disparo', icon: 'send' }
                ],
                columns: [{ id: 'novo_lead', name: 'Triagem' }, { id: 'atendimento', name: 'Negócio' }, { id: 'proposta', name: 'Proposta' }, { id: 'fechado', name: 'Venda' }],
                
                async init() {
                    const SB_URL = 'https://qhnbisjogpdoyszpsucs.supabase.co';
                    const SB_KEY = 'sb_publishable_3PAly_BCdvoldAzm1Y7SxQ_S3rp2QhQ';
                    this.client = supabase.createClient(SB_URL, SB_KEY);
                    await this.loadLeads();
                    await this.loadBotRules();
                    this.setupRealtime();
                    setTimeout(() => lucide.createIcons(), 100);
                },

                // LÓGICA DO FLOW BUILDER
                addStep(type) {
                    this.flowBuilder.steps.push({ type: type, content: type === 'delay' ? 2000 : '', fileObj: null, fileName: '' });
                    setTimeout(() => lucide.createIcons(), 50);
                },
                removeStep(index) { this.flowBuilder.steps.splice(index, 1); },
                attachFileToStep(event, index) {
                    const file = event.target.files[0];
                    if(file) { this.flowBuilder.steps[index].fileObj = file; this.flowBuilder.steps[index].fileName = file.name; }
                },
                async saveFlow() {
                    if(!this.flowBuilder.trigger) return alert('Insira um gatilho.');
                    if(this.flowBuilder.steps.length === 0) return alert('Adicione pelo menos um passo ao fluxo.');
                    
                    this.isSavingFlow = true;
                    try {
                        let finalSteps = [];
                        for(let step of this.flowBuilder.steps) {
                            if(['image', 'audio', 'document', 'video'].includes(step.type) && step.fileObj) {
                                const fileName = `flow-${Date.now()}-${step.fileObj.name.replace(/[^a-zA-Z0-9.]/g, '')}`;
                                await this.client.storage.from('chat_media').upload(`bot_media/${fileName}`, step.fileObj);
                                const { data } = this.client.storage.from('chat_media').getPublicUrl(`bot_media/${fileName}`);
                                finalSteps.push({ type: step.type, content: data.publicUrl });
                            } else {
                                finalSteps.push({ type: step.type, content: step.content });
                            }
                        }
                        
                        await this.client.from('chatbot_rules').insert({ 
                            trigger_text: this.flowBuilder.trigger.toLowerCase().trim(), 
                            flow_steps: finalSteps 
                        });
                        
                        this.flowBuilder = { trigger: '', steps: [] };
                        await this.loadBotRules();
                    } catch(e) { console.error(e); alert('Erro ao salvar fluxo.'); }
                    this.isSavingFlow = false;
                },

                // FUNÇÕES DO CHAT DE MÍDIA MANTIDAS
                extractUrl(text) { if (!text) return ''; const match = text.match(/https?:\/\/[^\s]+/); return match ? match[0] : text; },
                formatText(text) { if (!text) return ''; return text.replace(/\[(IMAGE|AUDIO|VIDEO|DOCUMENT|image|audio|video|document)\]/gi, '').trim(); },

                toggleTheme() { this.isDarkMode = !this.isDarkMode; localStorage.setItem('theme', this.isDarkMode ? 'dark' : 'light'); setTimeout(() => lucide.createIcons(), 50); },
                playSound() { new Audio('https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3').play().catch(() => {}); },

                async loadLeads() { const { data } = await this.client.from('leads').select('*').order('created_at', { ascending: false }); if (data) this.leads = data; setTimeout(() => lucide.createIcons(), 50); },
                async openChat(lead) { this.selectedLead = lead; this.selectedLeadStatus = lead.status; this.isChatOpen = true; this.messages = []; const { data } = await this.client.from('messages').select('*').eq('lead_id', lead.id).order('timestamp', { ascending: true }); this.messages = data || []; this.scrollToBottom(); setTimeout(() => lucide.createIcons(), 50); },

                async sendMsg() {
                    if(!this.msgInput || !this.selectedLead) return; const text = this.msgInput; this.msgInput = '';
                    this.messages.push({ id: Date.now(), content: text, from_me: true, type: 'text', timestamp: new Date().toISOString() }); this.scrollToBottom();
                    await fetch('https://projeto-evolution-api.xtknqq.easypanel.host/message/sendText/igor', { method: 'POST', headers: { 'apikey': '773C15E29974-4BA2-B003-3F697EC279AE', 'Content-Type': 'application/json' }, body: JSON.stringify({ "number": this.selectedLead.numero, "text": text }) });
                    await this.client.from('messages').insert({ lead_id: this.selectedLead.id, content: text, from_me: true, type: 'text' });
                },

                async uploadAndSend(event, type) {
                    const file = event.target.files[0]; if (!file || !this.selectedLead) return;
                    const fileName = `${Date.now()}-${file.name.replace(/[^a-zA-Z0-9]/g, '')}.${file.name.split('.').pop()}`;
                    await this.client.storage.from('chat_media').upload(`${this.selectedLead.numero}/${fileName}`, file);
                    const { data } = this.client.storage.from('chat_media').getPublicUrl(`${this.selectedLead.numero}/${fileName}`);
                    let endpoint = 'sendMedia'; let body = { number: this.selectedLead.numero, media: data.publicUrl };
                    if (type === 'audio') { endpoint = 'sendWhatsAppAudio'; delete body.media; body.audio = data.publicUrl; } else { body.mediatype = type === 'image' ? 'image' : type === 'video' ? 'video' : 'document'; body.fileName = file.name; }
                    this.messages.push({ id: Date.now(), content: data.publicUrl, from_me: true, type: type, timestamp: new Date().toISOString() }); this.scrollToBottom();
                    await fetch(`https://projeto-evolution-api.xtknqq.easypanel.host/message/${endpoint}/igor`, { method: 'POST', headers: { 'apikey': '773C15E29974-4BA2-B003-3F697EC279AE', 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
                    await this.client.from('messages').insert({ lead_id: this.selectedLead.id, content: data.publicUrl, from_me: true, type: type });
                },

                // DISPARO MANTIDO
                processSpintax(text, lead) {
                    if(!text) return ""; let msg = text.replace(/{nome}/g, lead.nome ? lead.nome.split(' ')[0] : 'Cliente');
                    return msg.replace(/{([^{}]+)}/g, function(match, options) { const words = options.split('|'); return words[Math.floor(Math.random() * words.length)]; });
                },

                async iniciarDisparo() {
                    if (this.disparoConfig.isRunning) return;
                    let alvos = this.leads; if (this.disparoConfig.status !== 'todos') alvos = this.leads.filter(l => l.status === this.disparoConfig.status);
                    if (alvos.length === 0) return alert('Nenhum lead encontrado.');
                    this.disparoConfig.isRunning = true; this.disparoConfig.total = alvos.length; this.disparoConfig.sent = 0;
                    
                    let publicMediaUrl = null; let mediaType = null;
                    if (this.disparoConfig.file) {
                        const file = this.disparoConfig.file; const fileName = `bulk-${Date.now()}-${file.name}`;
                        await this.client.storage.from('chat_media').upload(`disparos/${fileName}`, file);
                        const { data } = this.client.storage.from('chat_media').getPublicUrl(`disparos/${fileName}`);
                        publicMediaUrl = data.publicUrl; mediaType = file.type.includes('image') ? 'image' : file.type.includes('video') ? 'video' : file.type.includes('audio') ? 'audio' : 'document';
                    }

                    for (const lead of alvos) {
                        if (!this.disparoConfig.isRunning) break;
                        try {
                            if (publicMediaUrl) {
                                let endpoint = 'sendMedia'; let body = { number: lead.numero, media: publicMediaUrl, mediatype: mediaType, fileName: this.disparoConfig.file.name };
                                if(mediaType === 'audio') { endpoint = 'sendWhatsAppAudio'; delete body.media; body.audio = publicMediaUrl; }
                                await fetch(`https://projeto-evolution-api.xtknqq.easypanel.host/message/${endpoint}/igor`, { method: 'POST', headers: { 'apikey': '773C15E29974-4BA2-B003-3F697EC279AE', 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
                                await this.client.from('messages').insert({ lead_id: lead.id, content: `[${mediaType.toUpperCase()}] ${publicMediaUrl}`, from_me: true, type: mediaType });
                            }
                            if (this.disparoConfig.msg) {
                                const msgPronta = this.processSpintax(this.disparoConfig.msg, lead);
                                await fetch('https://projeto-evolution-api.xtknqq.easypanel.host/message/sendText/igor', { method: 'POST', headers: { 'apikey': '773C15E29974-4BA2-B003-3F697EC279AE', 'Content-Type': 'application/json' }, body: JSON.stringify({ number: lead.numero, text: msgPronta }) });
                                await this.client.from('messages').insert({ lead_id: lead.id, content: msgPronta, from_me: true, type: 'text' });
                            }
                        } catch (e) { console.error(e); }
                        this.disparoConfig.sent++;
                        if (this.disparoConfig.sent < this.disparoConfig.total && this.disparoConfig.isRunning) {
                            const delay = Math.floor(Math.random() * (this.disparoConfig.maxDelay - this.disparoConfig.minDelay + 1)) + parseInt(this.disparoConfig.minDelay);
                            await new Promise(r => setTimeout(r, delay * 1000));
                        }
                    }
                    this.disparoConfig.isRunning = false;
                },
                pararDisparo() { this.disparoConfig.isRunning = false; },

                // DISPARO MANUAL DE FLUXO PELO CHAT MANTIDO
                async triggerBotRuleManual(rule) {
                    if(!this.selectedLead) return;
                    if(rule.flow_steps) {
                        for(const step of rule.flow_steps) {
                            if (step.type === 'delay') { await new Promise(r => setTimeout(r, parseInt(step.content)||2000)); }
                            else if (step.type === 'text') { 
                                await fetch('https://projeto-evolution-api.xtknqq.easypanel.host/message/sendText/igor', { method: 'POST', headers: { 'apikey': '773C15E29974-4BA2-B003-3F697EC279AE', 'Content-Type': 'application/json' }, body: JSON.stringify({ number: this.selectedLead.numero, text: step.content }) }); 
                                await this.client.from('messages').insert({ lead_id: this.selectedLead.id, content: step.content, from_me: true, type: 'text' }); 
                            }
                            else {
                                let endpoint = 'sendMedia'; let bodyMedia = { number: this.selectedLead.numero, media: step.content, mediatype: step.type };
                                if (step.type === 'audio') { endpoint = 'sendWhatsAppAudio'; delete bodyMedia.media; bodyMedia.audio = step.content; }
                                await fetch(`https://projeto-evolution-api.xtknqq.easypanel.host/message/${endpoint}/igor`, { method: 'POST', headers: { 'apikey': '773C15E29974-4BA2-B003-3F697EC279AE', 'Content-Type': 'application/json' }, body: JSON.stringify(bodyMedia) });
                                await this.client.from('messages').insert({ lead_id: this.selectedLead.id, content: step.content, from_me: true, type: step.type });
                            }
                            if(step.type !== 'delay') await new Promise(r => setTimeout(r, 1000));
                        }
                    } else if (rule.media_url) {
                        // Legado
                        let endpoint = 'sendMedia'; let body = { number: this.selectedLead.numero, media: rule.media_url, mediatype: rule.media_type || 'document' };
                        if(rule.media_type === 'audio') { endpoint = 'sendWhatsAppAudio'; delete body.media; body.audio = rule.media_url; }
                        await fetch(`https://projeto-evolution-api.xtknqq.easypanel.host/message/${endpoint}/igor`, { method: 'POST', headers: { 'apikey': '773C15E29974-4BA2-B003-3F697EC279AE', 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
                        if(rule.response_text) await fetch('https://projeto-evolution-api.xtknqq.easypanel.host/message/sendText/igor', { method: 'POST', headers: { 'apikey': '773C15E29974-4BA2-B003-3F697EC279AE', 'Content-Type': 'application/json' }, body: JSON.stringify({ number: this.selectedLead.numero, text: rule.response_text }) });
                    }
                },

                async loadBotRules() { const { data } = await this.client.from('chatbot_rules').select('*').order('created_at', { ascending: false }); if(data) { this.botRules = data; setTimeout(() => lucide.createIcons(), 50); } },
                async deleteBotRule(id) { await this.client.from('chatbot_rules').delete().eq('id', id); this.loadBotRules(); },

                setupRealtime() {
                    this.client.channel('leads_channel').on('postgres_changes', { event: '*', schema: 'public', table: 'leads' }, () => this.loadLeads()).subscribe();
                    this.client.channel('msgs_channel').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                        if (!payload.new.from_me) this.playSound();
                        if (this.isChatOpen && payload.new.lead_id === this.selectedLead?.id) {
                            if(!this.messages.find(m => m.id === payload.new.id)) { this.messages.push(payload.new); this.scrollToBottom(); }
                        }
                    }).subscribe();
                },

                async updateStatus(id, status) { await this.client.from('leads').update({ status }).eq('id', id); this.loadLeads(); },
                scrollToBottom() { setTimeout(() => { const b = document.getElementById('chat-box'); if(b) b.scrollTop = b.scrollHeight; }, 100); }
            }
        }
    </script>
</body>
